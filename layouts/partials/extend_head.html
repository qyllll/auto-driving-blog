<style>
:root {
  --main-width: 900px;
}
</style>

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script>
(function() {
  function renderKaTeX() {
    if (typeof renderMathInElement !== 'function') {
      console.warn('KaTeX auto-render not loaded, retrying...');
      setTimeout(renderKaTeX, 200);
      return;
    }
    // Fix Goldmark double-backslash escaping in math text nodes
    (function fix(el) {
      if (el.nodeType === 3) {
        el.textContent = el.textContent.replace(/\\\\/g, '\\');
      } else if (el.nodeType === 1 && !/script|style|katex/i.test(el.tagName)) {
        for (let c of el.childNodes) fix(c);
      }
    })(document.body);
    renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ],
      throwOnError: false
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', renderKaTeX);
  } else {
    renderKaTeX();
  }
})();
</script>
