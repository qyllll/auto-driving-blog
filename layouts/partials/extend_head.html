<style>
:root {
  --main-width: 900px;
}
</style>

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Fix Goldmark double-backslash escaping in math blocks
  function fixMathEscapes(el) {
    if (el.nodeType === 3) { // text node
      el.textContent = el.textContent.replace(/\\\\/g, '\\');
    } else if (el.nodeType === 1 && !/script|style|katex/i.test(el.tagName)) {
      for (let child of el.childNodes) fixMathEscapes(child);
    }
  }
  fixMathEscapes(document.body);
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ],
      throwOnError: false
    });
  }
});
</script>
