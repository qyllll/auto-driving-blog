<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8a8a8a"/></marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4a9eff"/></marker>
  </defs>

  <!-- Unified Tokens -->
  <rect x="320" y="15" width="130" height="45" rx="8" fill="#2d3748" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="385" y="43" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Unified Tokens</text>

  <line x1="385" y1="60" x2="385" y2="90" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Token Type Router -->
  <polygon points="385,95 445,130 385,165 325,130" fill="#2d3748" stroke="#f6ad55" stroke-width="1.5"/>
  <text x="385" y="128" text-anchor="middle" fill="#fbd38d" font-size="12" font-weight="bold">Token</text>
  <text x="385" y="143" text-anchor="middle" fill="#fbd38d" font-size="12" font-weight="bold">Type</text>

  <!-- AR Tokens arrow (left) -->
  <path d="M 325,130 L 190,130" fill="none" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="245" y="120" text-anchor="middle" fill="#4a9eff" font-size="12" font-weight="bold">AR Tokens</text>

  <!-- DM Tokens arrow (right) -->
  <path d="M 445,130 L 590,130" fill="none" stroke="#68d391" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="545" y="120" text-anchor="middle" fill="#68d391" font-size="12" font-weight="bold">DM Tokens</text>

  <!-- Reasoner Tower (left) -->
  <rect x="30" y="155" width="160" height="100" rx="10" fill="#1a365d" stroke="#4a9eff" stroke-width="2"/>
  <text x="110" y="185" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Reasoner Tower</text>
  <text x="110" y="205" text-anchor="middle" fill="#90cdf4" font-size="12">因果推理</text>
  <text x="110" y="225" text-anchor="middle" fill="#90cdf4" font-size="12">因果注意力</text>
  <text x="110" y="245" text-anchor="middle" fill="#718096" font-size="10">视觉 + 语言 + 任务</text>

  <!-- Generator Tower (right) -->
  <rect x="580" y="155" width="160" height="100" rx="10" fill="#22543d" stroke="#68d391" stroke-width="2"/>
  <text x="660" y="185" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Generator Tower</text>
  <text x="660" y="205" text-anchor="middle" fill="#9ae6b4" font-size="12">连续生成</text>
  <text x="660" y="225" text-anchor="middle" fill="#9ae6b4" font-size="12">全双向注意力</text>
  <text x="660" y="245" text-anchor="middle" fill="#718096" font-size="10">条件 + 噪声 token</text>

  <!-- Joint Attention -->
  <rect x="210" y="175" width="350" height="60" rx="10" fill="#2b4c7e" stroke="#b794f4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="385" y="200" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Dual-Stream Joint Attention</text>
  <text x="385" y="220" text-anchor="middle" fill="#d6bcfa" font-size="11">Reasoner → Generator 单向信息流</text>

  <!-- Arrow: Reasoner → Joint Attention -->
  <line x1="190" y1="205" x2="205" y2="205" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow: Joint Attention → Generator -->
  <line x1="560" y1="205" x2="575" y2="205" stroke="#68d391" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Outputs -->
  <line x1="110" y1="255" x2="110" y2="310" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="30" y="315" width="160" height="45" rx="8" fill="#2d3748" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="110" y="340" text-anchor="middle" fill="#90cdf4" font-size="13" font-weight="bold">Reasoning</text>
  <text x="110" y="355" text-anchor="middle" fill="#90cdf4" font-size="13" font-weight="bold">Context h_t</text>

  <line x1="660" y1="255" x2="660" y2="310" stroke="#68d391" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="580" y="315" width="160" height="45" rx="8" fill="#2d3748" stroke="#68d391" stroke-width="1.5"/>
  <text x="660" y="340" text-anchor="middle" fill="#9ae6b4" font-size="13" font-weight="bold">Generation</text>
  <text x="660" y="355" text-anchor="middle" fill="#9ae6b4" font-size="13" font-weight="bold">Features z_t</text>

  <!-- Arrow from Reasoner Context to Generator (dashed - information flow) -->
  <path d="M 190,340 L 575,340" fill="none" stroke="#b794f4" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="385" y="333" text-anchor="middle" fill="#b794f4" font-size="11" font-style="italic">单向条件化</text>
</svg>