<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8a8a8a"/></marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">Flow Matching 连续轨迹生成</text>

  <!-- Input row -->
  <rect x="50" y="50" width="150" height="42" rx="6" fill="#22543d" stroke="#68d391" stroke-width="1.5"/>
  <text x="125" y="74" text-anchor="middle" fill="#9ae6b4" font-size="13" font-weight="bold">Gaussian Noise</text>
  <text x="125" y="88" text-anchor="middle" fill="#9ae6b4" font-size="11">A⁰ ~ N(0,I)</text>

  <rect x="230" y="50" width="150" height="42" rx="6" fill="#2b4c7e" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="305" y="74" text-anchor="middle" fill="#90cdf4" font-size="13" font-weight="bold">Reasoning</text>
  <text x="305" y="88" text-anchor="middle" fill="#90cdf4" font-size="13" font-weight="bold">Context h_t</text>

  <rect x="410" y="50" width="150" height="42" rx="6" fill="#553c7b" stroke="#b794f4" stroke-width="1.5"/>
  <text x="485" y="74" text-anchor="middle" fill="#d6bcfa" font-size="13" font-weight="bold">Generator</text>
  <text x="485" y="88" text-anchor="middle" fill="#d6bcfa" font-size="13" font-weight="bold">Features z_t</text>

  <rect x="590" y="50" width="150" height="42" rx="6" fill="#7b341e" stroke="#f6ad55" stroke-width="1.5"/>
  <text x="665" y="74" text-anchor="middle" fill="#fbd38d" font-size="13" font-weight="bold">Agent State</text>
  <text x="665" y="88" text-anchor="middle" fill="#fbd38d" font-size="13" font-weight="bold">s_t</text>

  <!-- Merge arrows down -->
  <line x1="125" y1="92" x2="125" y2="130" stroke="#68d391" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="305" y1="92" x2="305" y2="130" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="485" y1="92" x2="485" y2="130" stroke="#b794f4" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="665" y1="92" x2="665" y2="130" stroke="#f6ad55" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Flow pipeline -->
  <rect x="50" y="140" width="150" height="80" rx="10" fill="#276749" stroke="#68d391" stroke-width="2"/>
  <text x="125" y="170" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">Flow 1</text>
  <text x="125" y="192" text-anchor="middle" fill="#9ae6b4" font-size="12">v₁ = f_θ(A⁰, cond)</text>
  <text x="125" y="208" text-anchor="middle" fill="#9ae6b4" font-size="12">A¹ = A⁰ + v₁·Δt</text>

  <line x1="200" y1="180" x2="240" y2="180" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="250" y="140" width="150" height="80" rx="10" fill="#276749" stroke="#68d391" stroke-width="2"/>
  <text x="325" y="170" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">Flow 2</text>
  <text x="325" y="192" text-anchor="middle" fill="#9ae6b4" font-size="12">v₂ = f_θ(A¹, cond)</text>
  <text x="325" y="208" text-anchor="middle" fill="#9ae6b4" font-size="12">A² = A¹ + v₂·Δt</text>

  <line x1="400" y1="180" x2="440" y2="180" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="450" y="140" width="150" height="80" rx="10" fill="#276749" stroke="#68d391" stroke-width="2"/>
  <text x="525" y="170" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">⋯</text>
  <text x="525" y="195" text-anchor="middle" fill="#9ae6b4" font-size="12">重复 K 步</text>

  <line x1="600" y1="180" x2="640" y2="180" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="650" y="140" width="220" height="80" rx="10" fill="#2b4c7e" stroke="#4a9eff" stroke-width="2"/>
  <text x="760" y="168" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">连续轨迹</text>
  <text x="760" y="190" text-anchor="middle" fill="#90cdf4" font-size="14">A = {a₁, a₂, ..., a_T}</text>
  <text x="760" y="208" text-anchor="middle" fill="#90cdf4" font-size="12">6轮扭矩 + 6轮转角</text>

  <!-- Formula bar -->
  <rect x="50" y="260" width="820" height="55" rx="8" fill="#1a2332" stroke="#718096" stroke-width="1"/>
  <text x="460" y="284" text-anchor="middle" fill="#e2e8f0" font-size="14">积分过程：A^(k+1) = A^k + v_θ(A^k, h_t, z_t, s_t, k) · Δt</text>
  <text x="460" y="305" text-anchor="middle" fill="#a0aec0" font-size="12">从随机噪声 A⁰ 开始，经过 K 步积分，得到完整连续轨迹 A</text>
</svg>