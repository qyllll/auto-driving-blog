<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 350" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8a8a8a"/></marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#68d391"/></marker>
  </defs>

  <!-- Inputs on the left -->
  <rect x="10" y="10" width="180" height="35" rx="6" fill="#2d3748" stroke="#fc8181" stroke-width="1.5"/>
  <text x="100" y="32" text-anchor="middle" fill="#feb2b2" font-size="13">Gaussian Noise A⁰</text>

  <rect x="10" y="55" width="180" height="35" rx="6" fill="#2d3748" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="100" y="77" text-anchor="middle" fill="#90cdf4" font-size="13">Reasoning Context h_t</text>

  <rect x="10" y="100" width="180" height="35" rx="6" fill="#2d3748" stroke="#b794f4" stroke-width="1.5"/>
  <text x="100" y="122" text-anchor="middle" fill="#d6bcfa" font-size="13">Generator Features z_t</text>

  <rect x="10" y="145" width="180" height="35" rx="6" fill="#2d3748" stroke="#f6ad55" stroke-width="1.5"/>
  <text x="100" y="167" text-anchor="middle" fill="#fbd38d" font-size="13">Agent State s_t</text>

  <!-- Merging lines -->
  <line x1="190" y1="27" x2="230" y2="120" stroke="#fc8181" stroke-width="1.5"/>
  <line x1="190" y1="72" x2="230" y2="120" stroke="#4a9eff" stroke-width="1.5"/>
  <line x1="190" y1="117" x2="230" y2="120" stroke="#b794f4" stroke-width="1.5"/>
  <line x1="190" y1="162" x2="230" y2="120" stroke="#f6ad55" stroke-width="1.5"/>

  <!-- Flow Steps -->
  <rect x="240" y="90" width="140" height="60" rx="10" fill="#276749" stroke="#68d391" stroke-width="2"/>
  <text x="310" y="118" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Flow Step 1</text>
  <text x="310" y="138" text-anchor="middle" fill="#9ae6b4" font-size="12">预测速度场 v_t</text>

  <line x1="380" y1="120" x2="420" y2="120" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="430" y="90" width="140" height="60" rx="10" fill="#276749" stroke="#68d391" stroke-width="2"/>
  <text x="500" y="118" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Flow Step 2</text>
  <text x="500" y="138" text-anchor="middle" fill="#9ae6b4" font-size="12">去噪一步</text>

  <line x1="570" y1="120" x2="610" y2="120" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="640" y="115" text-anchor="middle" fill="#718096" font-size="24">⋯</text>

  <line x1="670" y1="120" x2="700" y2="120" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="620" y="150" width="140" height="60" rx="10" fill="#276749" stroke="#68d391" stroke-width="2"/>
  <text x="690" y="178" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Flow Step K</text>
  <text x="690" y="198" text-anchor="middle" fill="#9ae6b4" font-size="12">最后一步去噪</text>

  <path d="M 690,150 L 690,125" fill="none" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <line x1="760" y1="120" x2="790" y2="120" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="30" y="210" width="220" height="50" rx="8" fill="#1a2332" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="140" y="235" text-anchor="middle" fill="#e2e8f0" font-size="14">从噪声到轨迹的变换路径</text>
  <text x="140" y="252" text-anchor="middle" fill="#a0aec0" font-size="11">预测速度场 → 数值积分</text>

  <path d="M 760,120 L 790,120" fill="none" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="660" y="270" width="160" height="50" rx="10" fill="#2d3748" stroke="#68d391" stroke-width="2"/>
  <text x="740" y="294" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">连续轨迹</text>
  <text x="740" y="312" text-anchor="middle" fill="#9ae6b4" font-size="13">A¹ = {a₁, ..., a_T}</text>

  <line x1="760" y1="210" x2="740" y2="265" stroke="#68d391" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Flow description -->
  <text x="310" y="85" text-anchor="middle" fill="#718096" font-size="11">重复 K 步积分：A^(k+1) = A^k + v_k · Δt</text>
</svg>