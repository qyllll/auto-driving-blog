<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8a8a8a"/></marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">Flow Matching：从噪声到连续轨迹</text>

  <!-- Input box -->
  <rect x="140" y="48" width="620" height="80" rx="10" fill="#1a2332" stroke="#718096" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="160" y="70" text-anchor="start" fill="#e2e8f0" font-size="13" font-weight="bold">条件输入</text>

  <rect x="155" y="82" width="130" height="32" rx="6" fill="#2d3748" stroke="#fc8181" stroke-width="1.5"/>
  <text x="220" y="103" text-anchor="middle" fill="#feb2b2" font-size="13">Gaussian Noise A⁰</text>

  <rect x="305" y="82" width="140" height="32" rx="6" fill="#2d3748" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="375" y="103" text-anchor="middle" fill="#90cdf4" font-size="13">Reasoning Context h_t</text>

  <rect x="465" y="82" width="140" height="32" rx="6" fill="#2d3748" stroke="#b794f4" stroke-width="1.5"/>
  <text x="535" y="103" text-anchor="middle" fill="#d6bcfa" font-size="13">Generator Features z_t</text>

  <rect x="625" y="82" width="120" height="32" rx="6" fill="#2d3748" stroke="#f6ad55" stroke-width="1.5"/>
  <text x="685" y="103" text-anchor="middle" fill="#fbd38d" font-size="13">Agent State s_t</text>

  <!-- Vertical arrows down -->
  <line x1="220" y1="128" x2="220" y2="155" stroke="#fc8181" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="375" y1="128" x2="375" y2="155" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="535" y1="128" x2="535" y2="155" stroke="#b794f4" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="685" y1="128" x2="685" y2="155" stroke="#f6ad55" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Flow pipeline -->
  <rect x="65" y="165" width="160" height="75" rx="10" fill="#276749" stroke="#68d391" stroke-width="2"/>
  <text x="145" y="192" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Flow Step 1</text>
  <text x="145" y="212" text-anchor="middle" fill="#9ae6b4" font-size="12">预测速度场 v₁</text>
  <text x="145" y="228" text-anchor="middle" fill="#9ae6b4" font-size="11">A¹ = A⁰ + v₁ · Δt</text>

  <line x1="225" y1="202" x2="265" y2="202" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="275" y="165" width="160" height="75" rx="10" fill="#276749" stroke="#68d391" stroke-width="2"/>
  <text x="355" y="192" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Flow Step 2</text>
  <text x="355" y="212" text-anchor="middle" fill="#9ae6b4" font-size="12">预测速度场 v₂</text>
  <text x="355" y="228" text-anchor="middle" fill="#9ae6b4" font-size="11">A² = A¹ + v₂ · Δt</text>

  <line x1="435" y1="202" x2="475" y2="202" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="485" y="165" width="160" height="75" rx="10" fill="#276749" stroke="#68d391" stroke-width="2"/>
  <text x="565" y="192" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Flow Step K</text>
  <text x="565" y="212" text-anchor="middle" fill="#9ae6b4" font-size="12">最后一步去噪</text>
  <text x="565" y="228" text-anchor="middle" fill="#9ae6b4" font-size="11">Aᴷ = 完整轨迹</text>

  <line x1="645" y1="202" x2="685" y2="202" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="695" y="165" width="170" height="75" rx="12" fill="#2b4c7e" stroke="#4a9eff" stroke-width="2"/>
  <text x="780" y="190" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">连续轨迹</text>
  <text x="780" y="212" text-anchor="middle" fill="#90cdf4" font-size="14">A¹ = {a₁, ..., a_T}</text>
  <text x="780" y="230" text-anchor="middle" fill="#90cdf4" font-size="12">12D 动作块</text>

  <!-- Formula bar at bottom -->
  <rect x="100" y="280" width="700" height="50" rx="8" fill="#2d3748" stroke="#718096" stroke-width="1"/>
  <text x="450" y="302" text-anchor="middle" fill="#e2e8f0" font-size="14">从噪声到轨迹：A⁰ ~ N(0, I) → 重复 K 步积分 → 完整连续轨迹块</text>
  <text x="450" y="320" text-anchor="middle" fill="#a0aec0" font-size="12">A^(k+1) = A^k + v_θ(A^k, h_t, z_t, s_t, k) · Δt</text>

  <!-- Key differences box -->
  <rect x="100" y="350" width="700" height="55" rx="8" fill="#1a2332" stroke="#f6ad55" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="120" y="370" text-anchor="start" fill="#fbd38d" font-size="12" font-weight="bold">对比自回归生成：</text>
  <text x="120" y="390" text-anchor="start" fill="#a0aec0" font-size="11">不逐个生成离散 token  ·  一次联合建模完整未来轨迹  ·  易保持轨迹连续性  ·  可采样多条候选轨迹</text>
</svg>
