<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8a8a8a"/></marker>
  </defs>

  <!-- Input Nodes -->
  <rect x="30" y="20" width="130" height="60" rx="8" fill="#2d3748" stroke="#63b3ed" stroke-width="1.5"/>
  <text x="95" y="46" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Visual</text>
  <text x="95" y="64" text-anchor="middle" fill="#bee3f8" font-size="12">图像或短视频</text>

  <rect x="205" y="20" width="130" height="60" rx="8" fill="#2d3748" stroke="#68d391" stroke-width="1.5"/>
  <text x="270" y="46" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Language</text>
  <text x="270" y="64" text-anchor="middle" fill="#c6f6d5" font-size="12">任务或语言指令</text>

  <rect x="380" y="20" width="130" height="60" rx="8" fill="#2d3748" stroke="#f6ad55" stroke-width="1.5"/>
  <text x="445" y="46" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Agent State</text>
  <text x="445" y="64" text-anchor="middle" fill="#fbd38d" font-size="12">位姿/速度/状态</text>

  <rect x="550" y="20" width="130" height="60" rx="8" fill="#2d3748" stroke="#fc8181" stroke-width="1.5"/>
  <text x="615" y="46" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Scene & Goal</text>
  <text x="615" y="64" text-anchor="middle" fill="#feb2b2" font-size="12">场景/任务目标</text>

  <!-- Arrows down to encoders -->
  <line x1="95" y1="80" x2="95" y2="125" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="270" y1="80" x2="270" y2="125" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="445" y1="80" x2="445" y2="125" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="615" y1="80" x2="615" y2="125" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Encoder Nodes -->
  <rect x="20" y="130" width="150" height="50" rx="8" fill="#2b4c7e" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="95" y="155" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Vision Encoder</text>
  <text x="95" y="170" text-anchor="middle" fill="#90cdf4" font-size="11">ViT / CNN</text>

  <rect x="195" y="130" width="150" height="50" rx="8" fill="#2b4c7e" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="270" y="155" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Language Encoder</text>
  <text x="270" y="170" text-anchor="middle" fill="#90cdf4" font-size="11">LLM Tokenizer</text>

  <rect x="370" y="130" width="150" height="50" rx="8" fill="#2b4c7e" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="445" y="155" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">State Projector</text>
  <text x="445" y="170" text-anchor="middle" fill="#90cdf4" font-size="11">MLP</text>

  <rect x="540" y="130" width="150" height="50" rx="8" fill="#2b4c7e" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="615" y="155" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Context Projector</text>
  <text x="615" y="170" text-anchor="middle" fill="#90cdf4" font-size="11">MLP</text>

  <!-- Arrows down to unified space -->
  <line x1="95" y1="180" x2="95" y2="230" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="270" y1="180" x2="270" y2="230" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="445" y1="180" x2="445" y2="230" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="615" y1="180" x2="615" y2="230" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow labels -->
  <text x="95" y="210" text-anchor="middle" fill="#68d391" font-size="11">Visual tokens</text>
  <text x="270" y="210" text-anchor="middle" fill="#68d391" font-size="11">Language tokens</text>
  <text x="445" y="210" text-anchor="middle" fill="#68d391" font-size="11">State tokens</text>
  <text x="615" y="210" text-anchor="middle" fill="#68d391" font-size="11">Context tokens</text>

  <!-- Unified Token Space -->
  <rect x="100" y="240" width="490" height="160" rx="12" fill="#1a2332" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="345" y="270" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">Unified Token Space</text>
  <text x="345" y="295" text-anchor="middle" fill="#a0aec0" font-size="13">拼接所有 token 序列</text>
  
  <rect x="130" y="310" width="60" height="28" rx="5" fill="#4a9eff" opacity="0.7"/>
  <rect x="200" y="310" width="60" height="28" rx="5" fill="#68d391" opacity="0.7"/>
  <rect x="270" y="310" width="60" height="28" rx="5" fill="#f6ad55" opacity="0.7"/>
  <rect x="340" y="310" width="60" height="28" rx="5" fill="#fc8181" opacity="0.7"/>
  <rect x="410" y="310" width="60" height="28" rx="5" fill="#4a9eff" opacity="0.7"/>
  <rect x="480" y="310" width="60" height="28" rx="5" fill="#68d391" opacity="0.7"/>
  <text x="345" y="365" text-anchor="middle" fill="#a0aec0" font-size="12">token₁, token₂, ..., tokenₙ</text>
  <text x="345" y="385" text-anchor="middle" fill="#718096" font-size="11">输入到 Cosmos-3 双塔 MoT</text>
</svg>