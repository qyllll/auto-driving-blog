  <text x="740" y="212" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">Flow-GRPO 更新</text>

  <path d="M 565,267 Q 490,320 615,330" fill="none" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-red)"/>
  
  <rect x="400" y="325" width="230" height="24" rx="4" fill="#2d3748" opacity="0.85"/>
  <text x="515" y="341" text-anchor="middle" fill="#fc8181" font-size="12">更新 Router 与激活专家</text>
  <line x1="515" y1="325" x2="615" y2="295" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="6,4"/>
