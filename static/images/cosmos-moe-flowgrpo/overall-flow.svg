  <text x="615" y="164" text-anchor="middle" fill="#d6bcfa" font-size="12">Router + Top-K Experts</text>

  <line x1="690" y1="135" x2="725" y2="135" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arr)"/>

