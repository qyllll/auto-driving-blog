<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8a8a8a"/></marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#68d391"/></marker>
    <marker id="arr-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#f6ad55"/></marker>
  </defs>

  <text x="390" y="22" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">Sparse MoE：Token 路由与专家计算</text>

  <!-- Input -->
  <rect x="310" y="40" width="160" height="44" rx="8" fill="#2d3748" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="390" y="67" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Token Hidden State x</text>

  <line x1="390" y1="84" x2="390" y2="115" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Router -->
  <rect x="290" y="120" width="200" height="50" rx="10" fill="#553c7b" stroke="#b794f4" stroke-width="2"/>
  <text x="390" y="144" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">MoE Router</text>
  <text x="390" y="162" text-anchor="middle" fill="#d6bcfa" font-size="12">计算 token-expert 匹配分数</text>

  <!-- Branch labels -->
  <text x="140" y="180" text-anchor="middle" fill="#68d391" font-size="13" font-weight="bold">Shared Path（始终激活）</text>
  <text x="640" y="180" text-anchor="middle" fill="#fbd38d" font-size="13" font-weight="bold">Routed Path（Top-K 选择）</text>

  <!-- Router → Shared Experts -->
  <path d="M 290,145 L 140,145 L 140,195" fill="none" stroke="#68d391" stroke-width="2" marker-end="url(#arr-green)"/>
  <!-- Router → Routed Experts -->
  <path d="M 490,145 L 640,145 L 640,195" fill="none" stroke="#f6ad55" stroke-width="2" marker-end="url(#arr-yellow)"/>

  <!-- Shared Experts -->
  <rect x="60" y="200" width="160" height="50" rx="8" fill="#22543d" stroke="#68d391" stroke-width="1.5"/>
  <text x="140" y="225" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Shared Expert 1</text>
  <text x="140" y="243" text-anchor="middle" fill="#9ae6b4" font-size="12">公共推理能力</text>

  <rect x="60" y="265" width="160" height="50" rx="8" fill="#22543d" stroke="#68d391" stroke-width="1.5"/>
  <text x="140" y="290" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Shared Expert 2</text>
  <text x="140" y="308" text-anchor="middle" fill="#9ae6b4" font-size="12">公共推理能力</text>

  <!-- Routed Experts -->
  <rect x="555" y="200" width="170" height="50" rx="8" fill="#7b341e" stroke="#f6ad55" stroke-width="1.5"/>
  <text x="640" y="225" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Expert 1 ✓ (Top-2)</text>
  <text x="640" y="243" text-anchor="middle" fill="#fbd38d" font-size="12">轨迹结构建模</text>

  <rect x="555" y="265" width="170" height="50" rx="8" fill="#2d3748" stroke="#4a5568" stroke-width="1.5" opacity="0.5"/>
  <text x="640" y="290" text-anchor="middle" fill="#718096" font-size="14" font-weight="bold">Expert 2 ✗</text>
  <text x="640" y="308" text-anchor="middle" fill="#718096" font-size="12">未激活</text>

  <rect x="555" y="330" width="170" height="50" rx="8" fill="#7b341e" stroke="#f6ad55" stroke-width="1.5"/>
  <text x="640" y="355" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Expert 3 ✓ (Top-2)</text>
  <text x="640" y="373" text-anchor="middle" fill="#fbd38d" font-size="12">时间一致性建模</text>

  <rect x="555" y="395" width="170" height="50" rx="8" fill="#2d3748" stroke="#4a5568" stroke-width="1.5" opacity="0.5"/>
  <text x="640" y="420" text-anchor="middle" fill="#718096" font-size="14" font-weight="bold">Expert 4 ✗</text>
  <text x="640" y="438" text-anchor="middle" fill="#718096" font-size="12">未激活</text>

  <text x="640" y="195" text-anchor="end" fill="#718096" font-size="11">总共 N 个，每 token 激活 K 个</text>

  <!-- Path lines from experts down to aggregation -->
  <path d="M 220,225 L 300,225 L 300,465" fill="none" stroke="#68d391" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <path d="M 220,290 L 320,290 L 320,465" fill="none" stroke="#68d391" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <path d="M 555,225 L 470,225 L 470,465" fill="none" stroke="#f6ad55" stroke-width="1.5" marker-end="url(#arr-yellow)"/>
  <path d="M 555,355 L 440,355 L 440,465" fill="none" stroke="#f6ad55" stroke-width="1.5" marker-end="url(#arr-yellow)"/>

  <!-- Weighted Aggregation -->
  <rect x="270" y="460" width="220" height="55" rx="10" fill="#2b4c7e" stroke="#4a9eff" stroke-width="2"/>
  <text x="380" y="484" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Weighted Aggregation</text>
  <text x="380" y="503" text-anchor="middle" fill="#90cdf4" font-size="12">加权合并共享 + 被选专家输出</text>

  <line x1="380" y1="515" x2="380" y2="545" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="310" y="550" width="140" height="44" rx="8" fill="#2d3748" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="380" y="576" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">MoE 输出 y</text>
</svg>