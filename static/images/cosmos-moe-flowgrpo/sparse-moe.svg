<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 460" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8a8a8a"/></marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#68d391"/></marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#fc8181"/></marker>
  </defs>

  <!-- Input -->
  <rect x="200" y="10" width="120" height="40" rx="8" fill="#2d3748" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="260" y="34" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">Token x</text>

  <line x1="260" y1="50" x2="260" y2="75" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Router -->
  <rect x="180" y="80" width="160" height="45" rx="10" fill="#553c7b" stroke="#b794f4" stroke-width="2"/>
  <text x="260" y="100" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">MoE Router</text>
  <text x="260" y="117" text-anchor="middle" fill="#d6bcfa" font-size="11">计算 token-expert 匹配分</text>

  <!-- Router outputs -->
  <path d="M 180,102 L 100,102 L 100,150" fill="none" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 340,102 L 420,102 L 420,150" fill="none" stroke="#8a8a8a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="128" y="95" text-anchor="middle" fill="#68d391" font-size="11" font-weight="bold">始终激活</text>
  <text x="392" y="95" text-anchor="middle" fill="#fbd38d" font-size="11" font-weight="bold">Top-K 选择</text>

  <!-- Shared Experts -->
  <text x="260" y="145" text-anchor="middle" fill="#68d391" font-size="13" font-weight="bold">Shared Experts（始终激活）</text>
  <rect x="70" y="155" width="110" height="40" rx="6" fill="#22543d" stroke="#68d391" stroke-width="1.5"/>
  <text x="125" y="179" text-anchor="middle" fill="#9ae6b4" font-size="13">Shared Expert 1</text>
  <rect x="200" y="155" width="110" height="40" rx="6" fill="#22543d" stroke="#68d391" stroke-width="1.5"/>
  <text x="255" y="179" text-anchor="middle" fill="#9ae6b4" font-size="13">Shared Expert 2</text>

  <!-- Routed Experts -->
  <text x="260" y="230" text-anchor="middle" fill="#fbd38d" font-size="13" font-weight="bold">Routed Experts（Top-K 激活）</text>
  
  <rect x="70" y="245" width="110" height="40" rx="6" fill="#7b341e" stroke="#f6ad55" stroke-width="1.5"/>
  <text x="125" y="269" text-anchor="middle" fill="#fbd38d" font-size="13">Expert 1 ✓</text>

  <rect x="200" y="245" width="110" height="40" rx="6" fill="#2d3748" stroke="#4a5568" stroke-width="1.5" opacity="0.5"/>
  <text x="255" y="269" text-anchor="middle" fill="#718096" font-size="13">Expert 2 ✗</text>

  <rect x="330" y="245" width="110" height="40" rx="6" fill="#7b341e" stroke="#f6ad55" stroke-width="1.5"/>
  <text x="385" y="269" text-anchor="middle" fill="#fbd38d" font-size="13">Expert 3 ✓</text>

  <rect x="460" y="245" width="110" height="40" rx="6" fill="#2d3748" stroke="#4a5568" stroke-width="1.5" opacity="0.5"/>
  <text x="515" y="269" text-anchor="middle" fill="#718096" font-size="13">Expert 4 ✗</text>

  <text x="260" y="305" text-anchor="middle" fill="#718096" font-size="11">总共 N 个 expert，每个 token 只激活 K 个</text>

  <!-- Lines down to aggregation -->
  <path d="M 125,195 L 125,325 L 240,325" fill="none" stroke="#68d391" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 255,195 L 255,325" fill="none" stroke="#68d391" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 125,285 L 125,325 L 260,325" fill="none" stroke="#f6ad55" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 385,285 L 385,325 L 280,325" fill="none" stroke="#f6ad55" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Aggregation -->
  <rect x="180" y="330" width="160" height="45" rx="10" fill="#2b4c7e" stroke="#4a9eff" stroke-width="2"/>
  <text x="260" y="350" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">Weighted</text>
  <text x="260" y="367" text-anchor="middle" fill="#90cdf4" font-size="12">Aggregation</text>

  <line x1="260" y1="375" x2="260" y2="410" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="200" y="415" width="120" height="40" rx="8" fill="#2d3748" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="260" y="440" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">输出 y</text>
</svg>