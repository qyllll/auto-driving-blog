<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-white" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fff"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="noise" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="data" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Flow Matching 核心概念</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#64748b">学习一个速度场 v_θ(x,t)，通过 ODE 把噪声分布"流"到数据分布</text>

  <!-- === Panel 1: Noise Distribution === -->
  <rect x="30" y="75" width="200" height="270" fill="white" stroke="#e2e8f0" stroke-width="2" rx="8"/>
  <text x="130" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">t = 0（噪声）</text>
  <circle cx="130" cy="210" r="85" fill="url(#noise)" opacity="0.3"/>
  <!-- Random dots to represent noise -->
  <g fill="#64748b" opacity="0.6">
    <circle cx="100" cy="180" r="3"/><circle cx="150" cy="190" r="2.5"/>
    <circle cx="120" cy="230" r="2"/><circle cx="160" cy="220" r="3"/>
    <circle cx="90" cy="210" r="2.5"/><circle cx="140" cy="170" r="2"/>
    <circle cx="170" cy="200" r="2.5"/><circle cx="110" cy="250" r="2"/>
    <circle cx="80" cy="195" r="3"/><circle cx="145" cy="245" r="2.5"/>
    <circle cx="130" cy="160" r="2"/><circle cx="105" cy="175" r="2.5"/>
    <circle cx="155" cy="260" r="2"/><circle cx="160" cy="240" r="2.5"/>
  </g>
  <text x="130" y="325" text-anchor="middle" font-size="11" fill="#64748b">x₀ ~ 𝒩(0, I)</text>

  <!-- Arrow -->
  <line x1="235" y1="210" x2="310" y2="210" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="272" y="195" text-anchor="middle" font-size="11" fill="#3b82f6">ODE</text>
  <text x="272" y="230" text-anchor="middle" font-size="11" fill="#3b82f6">v_θ(x,t)</text>

  <!-- === Panel 2: Vector Field / Flow === -->
  <rect x="315" y="75" width="200" height="270" fill="white" stroke="#e2e8f0" stroke-width="2" rx="8"/>
  <text x="415" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">t ∈ (0, 1)（流）</text>
  <!-- Vector field arrows -->
  <g stroke="#3b82f6" stroke-width="1.5" opacity="0.5">
    <line x1="370" y1="150" x2="385" y2="145" marker-end="url(#arrow)"/>
    <line x1="410" y1="140" x2="425" y2="135" marker-end="url(#arrow)"/>
    <line x1="450" y1="150" x2="465" y2="145" marker-end="url(#arrow)"/>
    <line x1="360" y1="180" x2="380" y2="172" marker-end="url(#arrow)"/>
    <line x1="400" y1="175" x2="420" y2="165" marker-end="url(#arrow)"/>
    <line x1="440" y1="178" x2="460" y2="168" marker-end="url(#arrow)"/>
    <line x1="365" y1="215" x2="385" y2="210" marker-end="url(#arrow)"/>
    <line x1="405" y1="210" x2="425" y2="200" marker-end="url(#arrow)"/>
    <line x1="445" y1="215" x2="465" y2="208" marker-end="url(#arrow)"/>
    <line x1="370" y1="250" x2="390" y2="248" marker-end="url(#arrow)"/>
    <line x1="410" y1="245" x2="430" y2="240" marker-end="url(#arrow)"/>
    <line x1="450" y1="250" x2="470" y2="245" marker-end="url(#arrow)"/>
  </g>
  <!-- Central stream -->
  <path d="M 370 210 Q 400 200 440 190" stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M 365 200 Q 395 185 440 175" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="4,4"/>
  <path d="M 375 220 Q 405 215 440 205" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="4,4"/>
  <text x="415" y="325" text-anchor="middle" font-size="11" fill="#64748b">x_t = (1-t)·x₀ + t·x₁</text>

  <!-- Arrow -->
  <line x1="520" y1="210" x2="595" y2="210" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="557" y="195" text-anchor="middle" font-size="11" fill="#3b82f6">积分</text>
  <text x="557" y="230" text-anchor="middle" font-size="11" fill="#3b82f6">dx/dt = v_θ</text>

  <!-- === Panel 3: Data Distribution === -->
  <rect x="600" y="75" width="170" height="270" fill="white" stroke="#e2e8f0" stroke-width="2" rx="8"/>
  <text x="685" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">t = 1（数据）</text>
  <circle cx="685" cy="210" r="85" fill="url(#data)" opacity="0.3"/>
  <!-- Concentrated data points -->
  <g fill="#4f46e5" opacity="0.8">
    <circle cx="670" cy="195" r="3"/><circle cx="695" cy="190" r="2.5"/>
    <circle cx="680" cy="210" r="2.5"/><circle cx="700" cy="205" r="3"/>
    <circle cx="665" cy="215" r="2"/><circle cx="690" cy="220" r="2.5"/>
    <circle cx="675" cy="230" r="3"/><circle cx="710" cy="215" r="2"/>
    <circle cx="660" cy="205" r="2.5"/><circle cx="685" cy="200" r="2"/>
    <circle cx="705" cy="195" r="2.5"/><circle cx="670" cy="225" r="2.5"/>
    <circle cx="695" cy="235" r="2"/><circle cx="680" cy="185" r="2"/>
    <circle cx="715" cy="225" r="2.5"/><circle cx="655" cy="225" r="2"/>
  </g>
  <text x="685" y="325" text-anchor="middle" font-size="11" fill="#64748b">x₁ ~ pdata(x)</text>

  <!-- Bottom note -->
  <text x="400" y="370" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">训练：MSE(v_θ(x_t,t), x₁ - x₀) &nbsp;&nbsp;|&nbsp;&nbsp; 推理：x_0 + ∫ v_θ(x_t,t) dt</text>
</svg>
