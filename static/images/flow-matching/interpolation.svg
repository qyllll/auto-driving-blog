<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="800" height="360" fill="#f8fafc" rx="12"/>

  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Flow Matching 线性插值路径</text>
  <text x="400" y="46" text-anchor="middle" font-size="12" fill="#64748b">x_t = (1-t)·x₀ + t·x₁ &nbsp;&nbsp;→&nbsp;&nbsp; u_t = x₁ - x₀（恒定速度）</text>

  <!-- Main diagram area -->
  <rect x="30" y="65" width="740" height="260" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="10"/>

  <!-- x₀ noise point (bottom-left) -->
  <circle cx="120" cy="280" r="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="120" y="284" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">x₀</text>
  <text x="120" y="312" text-anchor="middle" font-size="10" fill="#94a3b8">噪声</text>

  <!-- x₁ data point (top-right) -->
  <circle cx="660" cy="90" r="12" fill="#c7d2fe" stroke="#6366f1" stroke-width="2"/>
  <text x="660" y="94" text-anchor="middle" font-size="10" font-weight="bold" fill="#4338ca">x₁</text>
  <text x="660" y="66" text-anchor="middle" font-size="10" fill="#6366f1">数据</text>

  <!-- Straight path line -->
  <line x1="132" y1="272" x2="648" y2="98" stroke="#3b82f6" stroke-width="3" opacity="0.9"/>

  <!-- Constant velocity vectors along path -->
  <g>
    <!-- u_t vectors (all same length and direction) -->
    <line x1="230" y1="232" x2="270" y2="215" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-green)"/>
    <line x1="340" y1="200" x2="380" y2="183" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-green)"/>
    <line x1="450" y1="168" x2="490" y2="151" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-green)"/>
    <line x1="560" y1="135" x2="600" y2="118" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  </g>

  <!-- u_t label -->
  <text x="380" y="175" text-anchor="middle" font-size="11" font-weight="bold" fill="#10b981">u_t = x₁ - x₀</text>
  <text x="380" y="190" text-anchor="middle" font-size="10" fill="#10b981">（恒定速度）</text>

  <!-- Interpolation points -->
  <circle cx="260" cy="225" r="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="260" y="228" text-anchor="middle" font-size="8" font-weight="bold" fill="#2563eb">t=0.25</text>

  <circle cx="390" cy="182" r="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="390" y="185" text-anchor="middle" font-size="8" font-weight="bold" fill="#2563eb">t=0.5</text>

  <circle cx="520" cy="138" r="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="520" y="141" text-anchor="middle" font-size="8" font-weight="bold" fill="#2563eb">t=0.75</text>

  <!-- v_θ prediction arrows (slightly off from u_t to show "learning" ) -->
  <g>
    <line x1="280" y1="218" x2="315" y2="203" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-red)" opacity="0.7"/>
    <line x1="400" y1="175" x2="435" y2="160" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-red)" opacity="0.7"/>
    <line x1="510" y1="135" x2="545" y2="120" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-red)" opacity="0.7"/>
  </g>
  <text x="454" y="155" font-size="9" fill="#f59e0b">v_θ</text>

  <!-- MSE = ||v_θ - u_t||² label -->
  <rect x="510" y="280" width="220" height="30" fill="#fef2f2" stroke="#fecaca" rx="6"/>
  <text x="620" y="300" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">ℒ = MSE(v_θ(x_t,t), u_t)</text>

  <!-- Training vs Inference callout -->
  <rect x="30" y="280" width="220" height="30" fill="#eff6ff" stroke="#bfdbfe" rx="6"/>
  <text x="140" y="300" text-anchor="middle" font-size="11" fill="#2563eb">训练：让 v_θ 逼近 u_t</text>

  <text x="400" y="345" text-anchor="middle" font-size="11" fill="#64748b">推理：x₁ = x₀ + ∫₀¹ v_θ(x_t,t) dt &nbsp;&nbsp;（从噪声沿直线积分到数据）</text>
</svg>
