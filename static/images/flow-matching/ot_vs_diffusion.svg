<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="dot" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4">
      <circle cx="5" cy="5" r="4" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="#f8fafc" rx="12"/>

  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Flow Matching vs Diffusion 路径对比</text>

  <!-- ========== LEFT: Flow Matching (OT Path) ========== -->
  <rect x="25" y="50" width="360" height="330" fill="white" stroke="#dbeafe" stroke-width="2" rx="10"/>
  <rect x="25" y="50" width="360" height="36" fill="#eff6ff" rx="10"/>
  <text x="205" y="73" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563eb">Flow Matching (OT 路径)</text>

  <!-- Grid -->
  <g stroke="#f1f5f9" stroke-width="1">
    <line x1="55" y1="120" x2="355" y2="120"/><line x1="55" y1="155" x2="355" y2="155"/>
    <line x1="55" y1="190" x2="355" y2="190"/><line x1="55" y1="225" x2="355" y2="225"/>
    <line x1="55" y1="260" x2="355" y2="260"/><line x1="55" y1="295" x2="355" y2="295"/>
    <line x1="90" y1="100" x2="90" y2="320"/><line x1="145" y1="100" x2="145" y2="320"/>
    <line x1="205" y1="100" x2="205" y2="320"/><line x1="265" y1="100" x2="265" y2="320"/>
    <line x1="320" y1="100" x2="320" y2="320"/>
  </g>

  <!-- Noise points (scattered) -->
  <g fill="#94a3b8" opacity="0.6">
    <circle cx="80" cy="115" r="3.5"/><circle cx="120" cy="135" r="3"/>
    <circle cx="95" cy="155" r="2.5"/><circle cx="140" cy="110" r="3"/>
    <circle cx="75" cy="140" r="2.5"/><circle cx="130" cy="150" r="3.5"/>
  </g>
  <text x="95" y="340" text-anchor="middle" font-size="10" fill="#94a3b8">t=0</text>

  <!-- Straight lines from noise to data -->
  <g>
    <line x1="95" y1="135" x2="320" y2="285" stroke="#3b82f6" stroke-width="2.5" opacity="0.8"/>
    <line x1="140" y1="115" x2="310" y2="260" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
    <line x1="80" y1="148" x2="300" y2="275" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
    <line x1="120" y1="145" x2="280" y2="240" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Intermediate interpolation points along straight lines -->
  <g fill="#60a5fa" opacity="0.5">
    <circle cx="170" cy="185" r="3"/><circle cx="220" cy="220" r="2.5"/>
    <circle cx="190" cy="175" r="2.5"/><circle cx="230" cy="205" r="3"/>
    <circle cx="160" cy="200" r="2"/><circle cx="210" cy="240" r="2.5"/>
  </g>
  <text x="205" y="120" text-anchor="middle" font-size="10" fill="#60a5fa">⋮ 线性插值 ⋮</text>

  <!-- Data points (concentrated) -->
  <g fill="#4f46e5" opacity="0.8">
    <circle cx="310" cy="275" r="3.5"/><circle cx="330" cy="285" r="3"/>
    <circle cx="320" cy="260" r="3"/><circle cx="340" cy="270" r="2.5"/>
    <circle cx="305" cy="290" r="2.5"/><circle cx="325" cy="300" r="3"/>
  </g>
  <text x="335" y="340" text-anchor="middle" font-size="10" fill="#4f46e5">t=1</text>

  <!-- Time labels along path -->
  <text x="145" y="168" font-size="9" fill="#60a5fa">t=0.25</text>
  <text x="210" y="213" font-size="9" fill="#60a5fa">t=0.5</text>
  <text x="270" y="255" font-size="9" fill="#60a5fa">t=0.75</text>

  <text x="205" y="365" text-anchor="middle" font-size="11" fill="#64748b">直线路径 → 大步长 Euler 即可</text>

  <!-- ========== RIGHT: Diffusion (Curved Path) ========== -->
  <rect x="415" y="50" width="360" height="330" fill="white" stroke="#fce7f3" stroke-width="2" rx="10"/>
  <rect x="415" y="50" width="360" height="36" fill="#fdf2f8" rx="10"/>
  <text x="595" y="73" text-anchor="middle" font-size="14" font-weight="bold" fill="#db2777">扩散模型（VP/VE 路径）</text>

  <!-- Grid -->
  <g stroke="#f1f5f9" stroke-width="1">
    <line x1="445" y1="120" x2="745" y2="120"/><line x1="445" y1="155" x2="745" y2="155"/>
    <line x1="445" y1="190" x2="745" y2="190"/><line x1="445" y1="225" x2="745" y2="225"/>
    <line x1="445" y1="260" x2="745" y2="260"/><line x1="445" y1="295" x2="745" y2="295"/>
    <line x1="480" y1="100" x2="480" y2="320"/><line x1="535" y1="100" x2="535" y2="320"/>
    <line x1="595" y1="100" x2="595" y2="320"/><line x1="655" y1="100" x2="655" y2="320"/>
    <line x1="710" y1="100" x2="710" y2="320"/>
  </g>

  <!-- Noise points -->
  <g fill="#94a3b8" opacity="0.6">
    <circle cx="470" cy="130" r="3.5"/><circle cx="510" cy="120" r="3"/>
    <circle cx="485" cy="145" r="2.5"/><circle cx="530" cy="115" r="3"/>
    <circle cx="465" cy="115" r="2.5"/><circle cx="520" cy="135" r="3.5"/>
  </g>
  <text x="485" y="340" text-anchor="middle" font-size="10" fill="#94a3b8">t=0</text>

  <!-- Curved SDE paths (Wiener process) -->
  <g>
    <!-- Path 1 -->
    <path d="M 480 125 Q 520 180 540 200 Q 570 230 600 250 Q 650 270 710 280" stroke="#ec4899" stroke-width="2.5" fill="none" opacity="0.7"/>
    <!-- Path 2 -->
    <path d="M 530 120 Q 550 170 560 195 Q 590 215 620 240 Q 670 260 710 270" stroke="#ec4899" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- Path 3 -->
    <path d="M 470 140 Q 510 170 530 210 Q 560 220 590 260 Q 650 275 700 290" stroke="#ec4899" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- Path 4 -->
    <path d="M 520 150 Q 560 180 580 205 Q 610 240 640 250 Q 680 265 710 295" stroke="#ec4899" stroke-width="1.5" fill="none" opacity="0.35"/>
  </g>

  <!-- Small noise perturbations along paths (jaggedness indicator) -->
  <g fill="#f472b6" opacity="0.4">
    <circle cx="520" cy="175" r="2" opacity="0.3"/>
    <circle cx="550" cy="200" r="2.5" opacity="0.2"/>
    <circle cx="580" cy="220" r="2" opacity="0.3"/>
    <circle cx="610" cy="240" r="2.5" opacity="0.2"/>
    <circle cx="640" cy="255" r="2" opacity="0.3"/>
  </g>

  <!-- Data points -->
  <g fill="#be185d" opacity="0.8">
    <circle cx="700" cy="285" r="3.5"/><circle cx="720" cy="280" r="3"/>
    <circle cx="710" cy="270" r="3"/><circle cx="730" cy="290" r="2.5"/>
    <circle cx="705" cy="295" r="2.5"/><circle cx="715" cy="305" r="3"/>
  </g>
  <text x="725" y="340" text-anchor="middle" font-size="10" fill="#be185d">t=1</text>

  <!-- Path labels showing curvature -->
  <text x="565" y="195" font-size="8" fill="#f472b6">⋰</text>
  <text x="625" y="245" font-size="8" fill="#f472b6">⋰</text>

  <text x="595" y="365" text-anchor="middle" font-size="11" fill="#64748b">弯曲路径 → 需要小步长（DDPM: 1000 步）</text>

  <!-- Center divider -->
  <line x1="395" y1="60" x2="395" y2="380" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
