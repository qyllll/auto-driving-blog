<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Noto Sans SC','Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7f8c8d"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8e44ad"/>
    </marker>
    <linearGradient id="boxGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f6ff"/>
      <stop offset="100%" stop-color="#dce8f5"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9e7"/>
      <stop offset="100%" stop-color="#fceabb"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eafaf1"/>
      <stop offset="100%" stop-color="#d5f5e3"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="620" fill="#fafafa" rx="8"/>

  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">JEPA-DRIVE 架构全景</text>

  <!-- Input features row -->
  <text x="30" y="58" font-size="12" font-weight="bold" fill="#555">场景输入</text>

  <rect x="30" y="66" width="125" height="40" rx="4" fill="#3498db" fill-opacity="0.15" stroke="#3498db" stroke-width="1.2"/>
  <text x="92" y="82" text-anchor="middle" font-size="11" fill="#2980b9">Object Token</text>
  <text x="92" y="96" text-anchor="middle" font-size="9" fill="#555">32 × 24 维</text>

  <rect x="165" y="66" width="125" height="40" rx="4" fill="#3498db" fill-opacity="0.15" stroke="#3498db" stroke-width="1.2"/>
  <text x="227" y="82" text-anchor="middle" font-size="11" fill="#2980b9">Lane Token</text>
  <text x="227" y="96" text-anchor="middle" font-size="9" fill="#555">16 × 24 维</text>

  <rect x="300" y="66" width="100" height="40" rx="4" fill="#3498db" fill-opacity="0.15" stroke="#3498db" stroke-width="1.2"/>
  <text x="350" y="82" text-anchor="middle" font-size="11" fill="#2980b9">Map Token</text>
  <text x="350" y="96" text-anchor="middle" font-size="9" fill="#555">4 × 24 维</text>

  <rect x="410" y="66" width="100" height="40" rx="4" fill="#3498db" fill-opacity="0.15" stroke="#3498db" stroke-width="1.2"/>
  <text x="460" y="82" text-anchor="middle" font-size="11" fill="#2980b9">Route Token</text>
  <text x="460" y="96" text-anchor="middle" font-size="9" fill="#555">4 × 24 维</text>

  <rect x="520" y="66" width="100" height="40" rx="4" fill="#3498db" fill-opacity="0.15" stroke="#3498db" stroke-width="1.2"/>
  <text x="570" y="82" text-anchor="middle" font-size="11" fill="#2980b9">Vel Token</text>
  <text x="570" y="96" text-anchor="middle" font-size="9" fill="#555">1 × 24 维</text>

  <rect x="630" y="66" width="125" height="40" rx="4" fill="#3498db" fill-opacity="0.15" stroke="#3498db" stroke-width="1.2"/>
  <text x="692" y="82" text-anchor="middle" font-size="11" fill="#2980b9">Dynamics Token</text>
  <text x="692" y="96" text-anchor="middle" font-size="9" fill="#555">8 × 24 维</text>

  <!-- Arrow down -->
  <line x1="450" y1="106" x2="450" y2="130" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- World Encoder box -->
  <rect x="60" y="135" width="780" height="100" rx="8" fill="url(#boxGrad1)" stroke="#2980b9" stroke-width="1.5"/>
  <text x="450" y="158" text-anchor="middle" font-size="14" font-weight="bold" fill="#2980b9">Phase A ✅ World Encoder（场景编码器）— 冻结</text>

  <rect x="90" y="170" width="100" height="28" rx="4" fill="#fff" stroke="#3498db" stroke-width="1"/>
  <text x="140" y="189" text-anchor="middle" font-size="10" fill="#555">Obj Encoder</text>
  <rect x="200" y="170" width="100" height="28" rx="4" fill="#fff" stroke="#3498db" stroke-width="1"/>
  <text x="250" y="189" text-anchor="middle" font-size="10" fill="#555">Lane Encoder</text>
  <rect x="310" y="170" width="100" height="28" rx="4" fill="#fff" stroke="#3498db" stroke-width="1"/>
  <text x="360" y="189" text-anchor="middle" font-size="10" fill="#555">Map Encoder</text>
  <rect x="420" y="170" width="100" height="28" rx="4" fill="#fff" stroke="#3498db" stroke-width="1"/>
  <text x="470" y="189" text-anchor="middle" font-size="10" fill="#555">Route Encoder</text>
  <rect x="530" y="170" width="100" height="28" rx="4" fill="#fff" stroke="#3498db" stroke-width="1"/>
  <text x="580" y="189" text-anchor="middle" font-size="10" fill="#555">Vel Encoder</text>
  <rect x="640" y="170" width="100" height="28" rx="4" fill="#fff" stroke="#3498db" stroke-width="1"/>
  <text x="690" y="189" text-anchor="middle" font-size="10" fill="#555">Dyn Encoder</text>

  <text x="450" y="220" text-anchor="middle" font-size="11" fill="#888">concat → LayerNorm → [65 tokens × 96 dim] 结构化隐空间表征</text>

  <!-- Arrow -->
  <line x1="450" y1="235" x2="450" y2="260" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vocabulary + Decoder -->
  <rect x="60" y="265" width="380" height="140" rx="8" fill="url(#boxGrad2)" stroke="#f39c12" stroke-width="1.5"/>
  <text x="250" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#d68910">Phase A ✅ 词汇表 + 解码器 — 冻结</text>

  <rect x="80" y="305" width="160" height="36" rx="4" fill="#fff" stroke="#f39c12" stroke-width="1"/>
  <text x="160" y="324" text-anchor="middle" font-size="11" fill="#d68910">Path Queries [512, 96]</text>
  <text x="160" y="336" text-anchor="middle" font-size="9" fill="#888">横向行为</text>

  <rect x="260" y="305" width="160" height="36" rx="4" fill="#fff" stroke="#f39c12" stroke-width="1"/>
  <text x="340" y="324" text-anchor="middle" font-size="11" fill="#d68910">Vel Queries [128, 96]</text>
  <text x="340" y="336" text-anchor="middle" font-size="9" fill="#888">纵向行为</text>

  <rect x="100" y="352" width="300" height="36" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="250" y="370" text-anchor="middle" font-size="11" fill="#d68910">Cartesian Product: 512×128 = 65,536 候选</text>
  <text x="250" y="384" text-anchor="middle" font-size="10" fill="#888">CrossAttn → MLP → 轨迹解码</text>

  <!-- Right side: Scorer -->
  <rect x="460" y="265" width="380" height="140" rx="8" fill="url(#boxGrad3)" stroke="#27ae60" stroke-width="1.5"/>
  <text x="650" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e8449">Phase B 🔄 FineScorer V2 — 训练中</text>

  <rect x="480" y="305" width="340" height="85" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="650" y="325" text-anchor="middle" font-size="11" fill="#333">输入：action_lat + attended + traj_lat + cycle_energy</text>
  <text x="650" y="345" text-anchor="middle" font-size="10" fill="#555">① TrajFusion: concat → MLP(288 → 1024 → 96)</text>
  <text x="650" y="362" text-anchor="middle" font-size="10" fill="#555">② CrossAttn → SceneQuery → ScoreHead</text>
  <text x="650" y="380" text-anchor="middle" font-size="10" fill="#555">③ Score [B,N] + Component [B,N,6]</text>

  <!-- Arrow down -->
  <line x1="250" y1="405" x2="250" y2="430" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="405" x2="650" y2="430" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow between Vocab and Scorer (connection) -->
  <path d="M440,340 L455,340" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- Cycle Energy box -->
  <rect x="60" y="435" width="780" height="80" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="450" y="458" text-anchor="middle" font-size="13" font-weight="bold" fill="#d35400">自监督信号：Cycle Energy（重建误差）</text>
  <text x="450" y="480" text-anchor="middle" font-size="11" fill="#555">轨迹前半段(action_lat) + 场景(world_tokens) → 预测轨迹后半段 → MSE(预测, 真实)</text>
  <text x="450" y="498" text-anchor="middle" font-size="10" fill="#888">低 cycle energy = 轨迹与场景一致 → 好轨迹 | 高 cycle energy = 轨迹与场景不符 → 坏轨迹</text>

  <!-- Arrow down -->
  <line x1="450" y1="515" x2="450" y2="540" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="250" y="545" width="400" height="50" rx="6" fill="#2c3e50" fill-opacity="0.08" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="450" y="568" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">最终输出：评分最高的轨迹 T* = argmax FineScorer(C)</text>
  <text x="450" y="584" text-anchor="middle" font-size="10" fill="#888">评估：NAVSIM selected_pdm / oracle_pdm</text>
</svg>