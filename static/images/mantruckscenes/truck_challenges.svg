<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F39C12"/>
    </marker>
  </defs>
  <rect width="600" height="420" fill="#fff"/>
  <text x="300" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">重卡感知四大特有挑战</text>
  
  <!-- Box 1: Trailer occlusion -->
  <rect x="20" y="55" width="270" height="155" rx="10" fill="#FFF3F3" stroke="#E74C3C" stroke-width="2"/>
  <text x="155" y="85" text-anchor="middle" font-size="15" font-weight="bold" fill="#C0392B">1. 挂车动态遮挡</text>
  
  <!-- Trailer occlusion diagram -->
  <rect x="120" y="130" width="80" height="40" rx="3" fill="#8B4513" opacity="0.6"/>
  <text x="160" y="155" text-anchor="middle" font-size="10" fill="#fff">挂车</text>
  <rect x="100" y="105" width="45" height="30" rx="3" fill="#4A4A4A"/>
  <text x="122" y="124" text-anchor="middle" font-size="8" fill="#fff">牵引车</text>
  
  <!-- Blind spot zone -->
  <path d="M 120 130 L 110 200 L 190 200 L 160 130 Z" fill="#E74C3C" opacity="0.2"/>
  <text x="148" y="190" text-anchor="middle" font-size="9" fill="#C0392B">盲区</text>
  
  <text x="155" y="200" text-anchor="middle" font-size="10" fill="#666">转弯时挂车遮挡侧后方视野</text>
  
  <!-- Box 2: Cabin-chassis motion -->
  <rect x="310" y="55" width="270" height="155" rx="10" fill="#F0F8FF" stroke="#3498DB" stroke-width="2"/>
  <text x="445" y="85" text-anchor="middle" font-size="15" font-weight="bold" fill="#2471A3">2. 驾驶室-底盘运动</text>
  
  <!-- Relative motion diagram -->
  <!-- Chassis -->
  <rect x="370" y="130" width="160" height="25" rx="3" fill="#666"/>
  <text x="450" y="147" text-anchor="middle" font-size="9" fill="#fff">底盘 (chassis)</text>
  
  <!-- Cabin (tilted to show relative motion) -->
  <rect x="410" y="100" width="60" height="35" rx="3" fill="#3498DB" transform="rotate(5 440 117)"/>
  <text x="445" y="122" text-anchor="middle" font-size="8" fill="#fff">驾驶室</text>
  
  <!-- Spring arrows -->
  <line x1="430" y1="130" x2="430" y2="140" stroke="#E74C3C" stroke-width="1.5"/>
  <line x1="450" y1="130" x2="450" y2="140" stroke="#E74C3C" stroke-width="1.5"/>
  <line x1="470" y1="130" x2="470" y2="140" stroke="#E74C3C" stroke-width="1.5"/>
  
  <text x="445" y="170" text-anchor="middle" font-size="10" fill="#666">过颠簸路面时相对晃动</text>
  <text x="445" y="185" text-anchor="middle" font-size="10" fill="#666">标定参数动态变化</text>
  
  <!-- Box 3: High perspective -->
  <rect x="20" y="230" width="270" height="155" rx="10" fill="#FFFDE7" stroke="#F39C12" stroke-width="2"/>
  <text x="155" y="260" text-anchor="middle" font-size="15" font-weight="bold" fill="#D4AC0D">3. 高架传感器视角</text>
  
  <!-- Height comparison -->
  <!-- Car -->
  <rect x="60" y="300" width="100" height="25" rx="3" fill="#4A90D9" opacity="0.6"/>
  <text x="110" y="316" text-anchor="middle" font-size="9" fill="#fff">乘用车(1.5m)</text>
  <!-- Truck -->
  <rect x="60" y="255" width="100" height="50" rx="3" fill="#D0021B" opacity="0.6"/>
  <text x="110" y="275" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">重卡(3.2m)</text>
  <!-- Arrow showing height difference -->
  <line x1="170" y1="260" x2="170" y2="300" stroke="#F39C12" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="180" y="283" font-size="10" fill="#F39C12">2x</text>
  
  <!-- Perspective lines -->
  <line x1="60" y1="255" x2="200" y2="340" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="60" y1="300" x2="200" y2="340" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  
  <text x="155" y="375" text-anchor="middle" font-size="10" fill="#666">透视参数、消失点完全改变</text>
  
  <!-- Box 4: Terminal environment -->
  <rect x="310" y="230" width="270" height="155" rx="10" fill="#E8F8F5" stroke="#1ABC9C" stroke-width="2"/>
  <text x="445" y="260" text-anchor="middle" font-size="15" font-weight="bold" fill="#148F77">4. 物流场站环境</text>
  
  <!-- Container yard diagram -->
  <rect x="370" y="275" width="40" height="30" rx="2" fill="#F39C12" opacity="0.5"/>
  <rect x="420" y="275" width="40" height="30" rx="2" fill="#F39C12" opacity="0.5"/>
  <rect x="470" y="275" width="40" height="30" rx="2" fill="#F39C12" opacity="0.5"/>
  <rect x="395" y="310" width="40" height="30" rx="2" fill="#E67E22" opacity="0.5"/>
  <rect x="445" y="310" width="40" height="30" rx="2" fill="#E67E22" opacity="0.5"/>
  
  <!-- Radar multipath -->
  <path d="M 390 340 Q 410 320 430 340" fill="none" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="435" y="355" text-anchor="middle" font-size="9" fill="#E74C3C">多径反射</text>
  
  <text x="445" y="380" text-anchor="middle" font-size="10" fill="#666">集装箱金属表面导致雷达多径反射</text>
</svg>