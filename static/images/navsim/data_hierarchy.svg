<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .l1{fill:#1e293b;}
      .l2{fill:#e0f2fe;stroke:#0284c7;stroke-width:1.5;}
      .l3{fill:#dcfce7;stroke:#16a34a;stroke-width:1.5;}
      .wt{font-size:14px;fill:#ffffff;text-anchor:middle;}
      .t{font-size:13px;fill:#0f172a;text-anchor:middle;}
      .st{font-size:11px;fill:#475569;text-anchor:middle;}
      .cap{font-size:12px;fill:#334155;}
    </style>
  </defs>

  <text x="450" y="26" font-size="15" fill="#0f172a" font-weight="bold" text-anchor="middle">NAVSIM 数据三层组织：log → frame → scene</text>

  <rect x="330" y="46" width="240" height="44" rx="8" class="l1"/>
  <text x="450" y="74" class="wt">log（一段完整行车记录）</text>

  <line x1="450" y1="90" x2="450" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <text x="600" y="112" class="cap">一段 log ≈ 几百~上千帧 @2Hz</text>

  <rect x="330" y="124" width="240" height="44" rx="8" class="l2"/>
  <text x="450" y="152" class="t">frame（2Hz 采样的一帧）</text>

  <line x1="450" y1="168" x2="450" y2="198" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <text x="610" y="200" class="cap">以某帧为中心截取前后若干秒</text>

  <rect x="330" y="202" width="240" height="44" rx="8" class="l3"/>
  <text x="450" y="230" class="t">scene（规划基本样本）</text>

  <line x1="570" y1="224" x2="720" y2="224" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="725" y="200" width="155" height="48" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="802" y="222" class="t">难例过滤器</text>
  <text x="802" y="240" class="st">筛掉无聊直行</text>

  <text x="450" y="292" class="cap" text-anchor="middle">约 15,910 段 log → 经过滤 → 103,288 个 scene（navtrain）</text>

  <rect x="60" y="270" width="200" height="50" rx="8" class="l3"/>
  <text x="160" y="292" class="t">train_logs 13,180</text>
  <text x="160" y="310" class="st">训练（按 log 整段切）</text>

  <rect x="300" y="270" width="200" height="50" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="400" y="292" class="t">val_logs 2,730</text>
  <text x="400" y="310" class="st">验证（同段不泄漏）</text>

  <text x="700" y="295" class="cap">按 log 切，不按帧切</text>
  <text x="700" y="313" class="cap">→ 防 train/val 泄漏</text>
</svg>
