<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .box{fill:#f1f5f9;stroke:#64748b;stroke-width:1.5;}
      .boxA{fill:#e0f2fe;stroke:#0284c7;stroke-width:1.5;}
      .boxB{fill:#dcfce7;stroke:#16a34a;stroke-width:1.5;}
      .boxC{fill:#fef9c3;stroke:#ca8a04;stroke-width:1.5;}
      .t{font-size:14px;fill:#0f172a;text-anchor:middle;}
      .st{font-size:11px;fill:#475569;text-anchor:middle;}
      .cap{font-size:13px;fill:#334155;}
    </style>
  </defs>

  <rect x="20" y="40" width="150" height="64" rx="8" class="boxA"/>
  <text x="95" y="68" class="t">输入场景</text>
  <text x="95" y="86" class="st">navtest 12,146 帧</text>
  <text x="95" y="100" class="st">环视图像 + 导航</text>

  <rect x="230" y="40" width="170" height="64" rx="8" class="box"/>
  <text x="315" y="68" class="t">规划模型</text>
  <text x="315" y="86" class="st">输出一条 ego 轨迹</text>

  <rect x="460" y="40" width="200" height="64" rx="8" class="boxB"/>
  <text x="560" y="62" class="t">非反应式仿真</text>
  <text x="560" y="80" class="st">v1: LQR 跟踪 + 日志背景</text>
  <text x="560" y="96" class="st">v2: IDM 反应式背景车</text>

  <rect x="720" y="40" width="160" height="64" rx="8" class="boxC"/>
  <text x="800" y="62" class="t">子指标评分</text>
  <text x="800" y="80" class="st">NC / DAC / TTC / EP</text>
  <text x="800" y="96" class="st">/ C (v2 加 DDC/TLC…)</text>

  <line x1="170" y1="72" x2="228" y2="72" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="72" x2="458" y2="72" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="72" x2="718" y2="72" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="300" y="190" width="300" height="64" rx="8" class="boxC"/>
  <text x="450" y="218" class="t">聚合为 PDMS / EPDMS</text>
  <text x="450" y="236" class="st">乘性惩罚 × 加权平均</text>
  <line x1="800" y1="104" x2="800" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="160" x2="452" y2="188" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="450" y1="254" x2="450" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="330" class="cap" text-anchor="middle">对全部场景取均值 → 排行榜上看到的那个分数</text>
</svg>
