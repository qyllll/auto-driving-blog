<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Courier New', monospace" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="a12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="a4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="a2fro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="a2rwl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <rect width="900" height="580" fill="url(#bg)" rx="12"/>

  <text x="450" y="28" fill="white" text-anchor="middle" font-size="15" font-weight="bold">CaRL 动作空间设计：四种 Action Pattern</text>

  <!-- ====== A12 ====== -->
  <rect x="20" y="50" width="210" height="240" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="20" y="50" width="210" height="24" rx="8" fill="url(#a12)"/>
  <text x="125" y="66" fill="white" text-anchor="middle" font-size="11" font-weight="bold">CaRL-A12</text>

  <text x="35" y="95" fill="#fca5a5" font-size="10">动作维度: 12</text>
  <text x="35" y="113" fill="#fca5a5" font-size="10">6 轮扭矩 + 6 轮转角</text>

  <!-- Truck top view -->
  <rect x="40" y="130" width="170" height="40" rx="4" fill="#3b1a1a" stroke="#ef4444" stroke-width="1"/>
  <!-- Front axle -->
  <line x1="60" y1="130" x2="60" y2="170" stroke="#fca5a5" stroke-width="1.5"/>
  <line x1="100" y1="130" x2="100" y2="170" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="80" y="185" fill="#fca5a5" text-anchor="middle" font-size="8">T1 δ1  T2 δ2</text>
  <!-- Mid axle -->
  <line x1="120" y1="130" x2="120" y2="170" stroke="#fca5a5" stroke-width="1.5"/>
  <line x1="140" y1="130" x2="140" y2="170" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="130" y="185" fill="#fca5a5" text-anchor="middle" font-size="8">T3 δ3  T4 δ4</text>
  <!-- Rear axle -->
  <line x1="160" y1="130" x2="160" y2="170" stroke="#fca5a5" stroke-width="1.5"/>
  <line x1="190" y1="130" x2="190" y2="170" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="175" y="185" fill="#fca5a5" text-anchor="middle" font-size="8">T5 δ5  T6 δ6</text>

  <text x="125" y="215" fill="#fca5a5" text-anchor="middle" font-size="10">NRS = 64.13</text>
  <text x="125" y="235" fill="#fca5a5" text-anchor="middle" font-size="10">收敛困难，易侧翻</text>
  <text x="125" y="260" fill="#64748b" text-anchor="middle" font-size="9">各轮完全独立，空间太大</text>

  <!-- ====== A4 ====== -->
  <rect x="245" y="50" width="210" height="240" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="245" y="50" width="210" height="24" rx="8" fill="url(#a4)"/>
  <text x="350" y="66" fill="white" text-anchor="middle" font-size="11" font-weight="bold">CaRL-A4</text>

  <text x="260" y="95" fill="#fde68a" font-size="10">动作维度: 4</text>
  <text x="260" y="113" fill="#fde68a" font-size="10">T_f, T_m, T_r + δ_f</text>

  <rect x="265" y="130" width="170" height="40" rx="4" fill="#4d3d11" stroke="#f59e0b" stroke-width="1"/>
  <!-- Front axle - grouped -->
  <line x1="285" y1="130" x2="285" y2="170" stroke="#fde68a" stroke-width="2"/>
  <line x1="325" y1="130" x2="325" y2="170" stroke="#fde68a" stroke-width="2"/>
  <text x="305" y="185" fill="#fde68a" text-anchor="middle" font-size="8">T_f  δ_f→</text>
  <!-- Mid axle -->
  <line x1="345" y1="130" x2="345" y2="170" stroke="#fde68a" stroke-width="2"/>
  <line x1="365" y1="130" x2="365" y2="170" stroke="#fde68a" stroke-width="2"/>
  <text x="355" y="185" fill="#fde68a" text-anchor="middle" font-size="8">T_m</text>
  <!-- Rear axle -->
  <line x1="385" y1="130" x2="385" y2="170" stroke="#fde68a" stroke-width="2"/>
  <line x1="420" y1="130" x2="420" y2="170" stroke="#fde68a" stroke-width="2"/>
  <text x="400" y="185" fill="#fde68a" text-anchor="middle" font-size="8">T_r</text>

  <text x="350" y="215" fill="#fde68a" text-anchor="middle" font-size="10">NRS = 88.53</text>
  <text x="350" y="235" fill="#fde68a" text-anchor="middle" font-size="10">分组驱动，性能提升</text>
  <text x="350" y="260" fill="#64748b" text-anchor="middle" font-size="9">前轴一起转（阿克曼）</text>

  <!-- ====== A2-FRO ====== -->
  <rect x="470" y="50" width="210" height="240" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <rect x="470" y="50" width="210" height="24" rx="8" fill="url(#a2fro)"/>
  <text x="575" y="66" fill="white" text-anchor="middle" font-size="11" font-weight="bold">CaRL-A2-FRO</text>

  <text x="485" y="95" fill="#6ee7b7" font-size="10">动作维度: 2</text>
  <text x="485" y="113" fill="#6ee7b7" font-size="10">v, ψ_dot（速度+横摆角速度）</text>

  <rect x="490" y="130" width="170" height="40" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <!-- Front axle - turning left -->
  <line x1="510" y1="130" x2="500" y2="170" stroke="#6ee7b7" stroke-width="2"/>
  <line x1="550" y1="130" x2="540" y2="170" stroke="#6ee7b7" stroke-width="2"/>
  <text x="525" y="185" fill="#6ee7b7" text-anchor="middle" font-size="8">δ_f 左转</text>
  <!-- Mid axle -->
  <line x1="570" y1="130" x2="570" y2="170" stroke="#6ee7b7" stroke-width="2"/>
  <line x1="590" y1="130" x2="590" y2="170" stroke="#6ee7b7" stroke-width="2"/>
  <text x="580" y="185" fill="#6ee7b7" text-anchor="middle" font-size="8">直行</text>
  <!-- Rear axle - turning RIGHT -->
  <line x1="610" y1="130" x2="620" y2="170" stroke="#6ee7b7" stroke-width="2"/>
  <line x1="645" y1="130" x2="655" y2="170" stroke="#6ee7b7" stroke-width="2"/>
  <text x="630" y="185" fill="#6ee7b7" text-anchor="middle" font-size="8">δ_r 右转</text>

  <text x="575" y="215" fill="#6ee7b7" text-anchor="middle" font-size="10" font-weight="bold">NRS = 97.67</text>
  <text x="575" y="235" fill="#6ee7b7" text-anchor="middle" font-size="10">前后轮反向 -> 转弯半径最小</text>
  <text x="575" y="260" fill="#6ee7b7" text-anchor="middle" font-size="9">R = L / (tanδ_f + tanδ_r)</text>

  <!-- ====== A2-RWL ====== -->
  <rect x="695" y="50" width="185" height="240" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="695" y="50" width="185" height="24" rx="8" fill="url(#a2rwl)"/>
  <text x="788" y="66" fill="white" text-anchor="middle" font-size="11" font-weight="bold">CaRL-A2-RWL</text>

  <text x="710" y="95" fill="#93c5fd" font-size="10">动作维度: 2</text>
  <text x="710" y="113" fill="#93c5fd" font-size="10">v, ψ_dot</text>

  <rect x="710" y="130" width="155" height="40" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <!-- Front axle -->
  <line x1="730" y1="130" x2="720" y2="170" stroke="#93c5fd" stroke-width="2"/>
  <line x1="760" y1="130" x2="750" y2="170" stroke="#93c5fd" stroke-width="2"/>
  <text x="740" y="185" fill="#93c5fd" text-anchor="middle" font-size="8">δ_f 左转</text>
  <!-- Mid axle -->
  <line x1="770" y1="130" x2="770" y2="170" stroke="#93c5fd" stroke-width="2"/>
  <line x1="790" y1="130" x2="790" y2="170" stroke="#93c5fd" stroke-width="2"/>
  <text x="780" y="185" fill="#93c5fd" text-anchor="middle" font-size="8">直行</text>
  <!-- Rear axle - LOCKED -->
  <line x1="810" y1="130" x2="810" y2="170" stroke="#64748b" stroke-width="2"/>
  <line x1="840" y1="130" x2="840" y2="170" stroke="#64748b" stroke-width="2"/>
  <text x="825" y="185" fill="#64748b" text-anchor="middle" font-size="8">锁止</text>

  <text x="788" y="215" fill="#93c5fd" text-anchor="middle" font-size="10">NRS = 91.78</text>
  <text x="788" y="235" fill="#93c5fd" text-anchor="middle" font-size="10">后轮锁止，稳定</text>
  <text x="788" y="260" fill="#64748b" text-anchor="middle" font-size="9">转弯半径较大</text>

  <!-- ====== Bottom: Performance summary ====== -->
  <rect x="20" y="310" width="860" height="250" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <text x="450" y="338" fill="white" text-anchor="middle" font-size="13" font-weight="bold">四种 Action Pattern 性能对比</text>

  <!-- Turning radius comparison -->
  <text x="60" y="368" fill="#93c5fd" font-size="11">转弯半径公式</text>
  <text x="60" y="388" fill="#bfdbfe" font-size="11">阿克曼转向: R = L / tan(δ_f)</text>
  <text x="60" y="408" fill="#bfdbfe" font-size="11">FRO 前后反向: R = L / (tan(δ_f) + tan(δ_r))</text>
  <text x="60" y="428" fill="#6ee7b7" font-size="11">对于长轴距 DET，FRO 转弯半径显著减小</text>
  <text x="60" y="448" fill="#64748b" font-size="10">L = 轴距, δ_f = 前轮转角, δ_r = 后轮转角</text>

  <!-- Summary table -->
  <text x="500" y="368" fill="#93c5fd" font-size="11">关键指标总结</text>
  <text x="500" y="395" fill="#fca5a5" font-size="10">A12: 全自由 (12D) -> NRS=64.13, 收敛难</text>
  <text x="500" y="415" fill="#fde68a" font-size="10">A4:  分组驱动 (4D) -> NRS=88.53, 中等</text>
  <text x="500" y="435" fill="#6ee7b7" font-size="10" font-weight="bold">A2-FRO: 前后反向 (2D) -> NRS=97.67, 最佳</text>
  <text x="500" y="455" fill="#93c5fd" font-size="10">A2-RWL: 后轮锁止 (2D) -> NRS=91.78, 稳定</text>

  <text x="450" y="500" fill="#64748b" text-anchor="middle" font-size="11">动作空间设计比模型容量更重要 —— 2 自由度的 FRO 碾压 12 自由度的 A12</text>

  <!-- Turning radius visualization -->
  <path d="M 80 530 Q 200 510 300 520" stroke="#fca5a5" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="190" y="540" fill="#fca5a5" text-anchor="middle" font-size="8">阿克曼 R 大</text>
  <path d="M 80 545 Q 180 530 250 540" stroke="#6ee7b7" stroke-width="2" fill="none"/>
  <text x="165" y="555" fill="#6ee7b7" text-anchor="middle" font-size="8">FRO R 小</text>
</svg>