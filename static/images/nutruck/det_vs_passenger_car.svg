<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Courier New', monospace" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="carGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="truckGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="url(#bg)" rx="12"/>

  <text x="450" y="28" fill="white" text-anchor="middle" font-size="15" font-weight="bold">乘用车 vs 分布式电驱重卡（DET）物理特性对比</text>

  <!-- ====== LEFT: Passenger Car ====== -->
  <rect x="20" y="50" width="420" height="450" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="20" y="50" width="420" height="28" rx="8" fill="url(#carGrad)"/>
  <text x="230" y="69" fill="white" text-anchor="middle" font-size="12" font-weight="bold">乘用车（Passenger Car）</text>

  <!-- Car body -->
  <rect x="100" y="120" width="280" height="60" rx="15" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Car roof -->
  <path d="M 130 120 Q 180 70 250 70 Q 320 70 360 120" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>

  <!-- Wheels -->
  <circle cx="140" cy="185" r="16" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="140" cy="185" r="6" fill="#60a5fa"/>
  <circle cx="340" cy="185" r="16" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="340" cy="185" r="6" fill="#60a5fa"/>

  <!-- Center of mass indicator -->
  <circle cx="240" cy="130" r="6" fill="#ef4444"/>
  <line x1="240" y1="130" x2="240" y2="185" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="250" y="128" fill="#fca5a5" font-size="10">CoG h ≈ 0.5m</text>

  <!-- Labels -->
  <text x="230" y="225" fill="#93c5fd" text-anchor="middle" font-size="11" font-weight="bold">关键参数</text>
  <text x="60" y="250" fill="#bfdbfe" font-size="11">驱动方式：集中驱动（前轴/后轴）</text>
  <text x="60" y="270" fill="#bfdbfe" font-size="11">质心高度：0.5 - 0.6 m</text>
  <text x="60" y="290" fill="#bfdbfe" font-size="11">侧翻风险：几乎为零</text>
  <text x="60" y="310" fill="#bfdbfe" font-size="11">动作空间：2-4 维（油门/刹车/转向）</text>
  <text x="60" y="330" fill="#bfdbfe" font-size="11">轴数：2 轴（4 轮）</text>

  <text x="230" y="370" fill="#93c5fd" text-anchor="middle" font-size="11" font-weight="bold">vs 规划评测现状</text>
  <text x="60" y="395" fill="#93c5fd" font-size="11">- nuPlan/Waymax 等基准</text>
  <text x="60" y="415" fill="#93c5fd" font-size="11">- 运动学自行车模型就够了</text>
  <text x="60" y="435" fill="#93c5fd" font-size="11">- 「无碰撞 = 安全」的假设成立</text>
  <text x="60" y="455" fill="#93c5fd" font-size="11">- 规划-控制分层分工有效</text>

  <!-- ====== RIGHT: DET Truck ====== -->
  <rect x="460" y="50" width="420" height="450" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="460" y="50" width="420" height="28" rx="8" fill="url(#truckGrad)"/>
  <text x="670" y="69" fill="white" text-anchor="middle" font-size="12" font-weight="bold">分布式电驱重卡（DET）</text>

  <!-- Truck body -->
  <rect x="480" y="100" width="380" height="70" rx="8" fill="#4d3d11" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- Truck cabin -->
  <rect x="480" y="100" width="100" height="70" rx="8" fill="#4d3d11" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- Windshield -->
  <rect x="485" y="108" width="40" height="25" rx="3" fill="#1e293b"/>
  <!-- Cargo box -->
  <rect x="580" y="100" width="280" height="70" rx="4" fill="#4d3d11" stroke="#fbbf24" stroke-width="1"/>

  <!-- 3 axles, 6 wheels - front axle -->
  <circle cx="510" cy="175" r="14" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="510" cy="175" r="5" fill="#fbbf24"/>
  <circle cx="530" cy="175" r="14" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="530" cy="175" r="5" fill="#fbbf24"/>

  <!-- middle axle -->
  <circle cx="660" cy="175" r="14" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="660" cy="175" r="5" fill="#fbbf24"/>
  <circle cx="680" cy="175" r="14" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="680" cy="175" r="5" fill="#fbbf24"/>

  <!-- rear axle -->
  <circle cx="790" cy="175" r="14" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="790" cy="175" r="5" fill="#fbbf24"/>
  <circle cx="810" cy="175" r="14" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="810" cy="175" r="5" fill="#fbbf24"/>

  <!-- Center of mass indicator -->
  <circle cx="670" cy="105" r="6" fill="#ef4444"/>
  <line x1="670" y1="105" x2="670" y2="175" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="680" y="103" fill="#fca5a5" font-size="10">CoG h ≈ 1.8m</text>

  <!-- Labels -->
  <text x="670" y="225" fill="#fde68a" text-anchor="middle" font-size="11" font-weight="bold">关键参数</text>
  <text x="500" y="250" fill="#fde68a" font-size="11">驱动方式：6 轮独立驱动 + 独立转向</text>
  <text x="500" y="270" fill="#fde68a" font-size="11">质心高度：1.5 - 1.8 m（满载更高）</text>
  <text x="500" y="290" fill="#fde68a" font-size="11">侧翻风险：极高（质心高 + 载荷转移）</text>
  <text x="500" y="310" fill="#fde68a" font-size="11">动作空间：12 维（6 轮扭矩 + 6 轮转角）</text>
  <text x="500" y="330" fill="#fde68a" font-size="11">轴数：3 轴（6 轮）</text>

  <text x="670" y="370" fill="#fde68a" text-anchor="middle" font-size="11" font-weight="bold">vs 规划评测空缺</text>
  <text x="500" y="395" fill="#fde68a" font-size="11">- 无 DET 专用闭环基准</text>
  <text x="500" y="415" fill="#fde68a" font-size="11">- 运动学模型完全失真</text>
  <text x="500" y="435" fill="#fca5a5" font-size="11">- 「无碰撞 != 安全」——还会翻车！</text>
  <text x="500" y="455" fill="#fca5a5" font-size="11">- 规划-控制分工出现致命漏洞</text>

  <!-- Arrow between -->
  <line x1="440" y1="275" x2="460" y2="275" stroke="#64748b" stroke-width="2"/>
  <polygon points="455,270 465,275 455,280" fill="#64748b"/>
  <text x="450" y="260" fill="#64748b" text-anchor="middle" font-size="9" transform="rotate(-90 450 260)">本质差异</text>
</svg>