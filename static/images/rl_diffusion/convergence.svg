<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="system-ui, -apple-system, sans-serif">
  <rect width="860" height="460" fill="#f8fafc" rx="12"/>
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">不同范式的收敛对比（示意图）</text>
  <text x="430" y="50" text-anchor="middle" font-size="11" fill="#64748b">横轴：训练迭代 &#160; 纵轴：任务奖励分数</text>

  <!-- Chart area -->
  <rect x="60" y="80" width="740" height="280" fill="white" stroke="#e2e8f0" rx="8"/>

  <!-- Axis -->
  <line x1="80" y1="340" x2="80" y2="100" stroke="#64748b" stroke-width="1.5"/>
  <line x1="80" y1="340" x2="780" y2="340" stroke="#64748b" stroke-width="1.5"/>

  <!-- Grid lines -->
  <line x1="80" y1="180" x2="780" y2="180" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="80" y1="260" x2="780" y2="260" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Expert level line -->
  <line x1="80" y1="140" x2="780" y2="140" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="785" y="145" font-size="11" fill="#94a3b8" font-weight="bold">专家水平</text>

  <!-- Y-axis labels -->
  <text x="72" y="345" text-anchor="end" font-size="9" fill="#94a3b8">0</text>
  <text x="72" y="265" text-anchor="end" font-size="9" fill="#94a3b8">50</text>
  <text x="72" y="185" text-anchor="end" font-size="9" fill="#94a3b8">100</text>
  <text x="72" y="145" text-anchor="end" font-size="9" fill="#94a3b8">专家线</text>

  <!-- SFT baseline -->
  <path d="M 80 340 L 80 340 L 100 325 Q 200 320 400 318 Q 600 318 780 318" stroke="#94a3b8" stroke-width="3" fill="none" stroke-dasharray="6,4"/>
  <text x="400" y="308" text-anchor="middle" font-size="10" fill="#94a3b8">SFT（永远低于专家水平）</text>

  <!-- Paradigm 1: Reward Guidance -->
  <path d="M 80 340 L 100 325 L 120 250 Q 200 240 400 240 Q 600 240 780 240" stroke="#3b82f6" stroke-width="3" fill="none"/>
  <rect x="540" y="228" width="230" height="20" fill="white" rx="3"/>
  <text x="655" y="243" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="bold">范式一：引导（一步到位，无后续增长）</text>

  <!-- Paradigm 1 annotation -->
  <circle cx="120" cy="250" r="5" fill="#3b82f6"/>
  <text x="120" y="242" text-anchor="middle" font-size="9" fill="#2563eb">不加训练直接提升</text>

  <!-- Paradigm 2: RFT -->
  <path d="M 80 340 L 100 325 L 150 300 L 200 300 L 250 260 L 300 260 L 350 230 L 400 230 L 450 210 L 500 210 L 550 195 L 600 195 L 650 185 L 700 185 L 750 180 L 780 175" stroke="#059669" stroke-width="3" fill="none"/>
  <rect x="580" y="163" width="195" height="20" fill="white" rx="3"/>
  <text x="677" y="178" text-anchor="middle" font-size="10" fill="#059669" font-weight="bold">范式二：RFT（阶梯式提升）</text>

  <!-- RFT annotations -->
  <circle cx="200" cy="300" r="5" fill="#059669"/>
  <text x="200" y="318" text-anchor="middle" font-size="9" fill="#059669">第1轮RFT</text>
  <circle cx="400" cy="230" r="5" fill="#059669"/>
  <text x="400" y="222" text-anchor="middle" font-size="9" fill="#059669">第3轮RFT</text>
  <circle cx="600" cy="195" r="5" fill="#059669"/>
  <text x="600" y="212" text-anchor="middle" font-size="9" fill="#059669">开始饱和</text>

  <!-- Paradigm 3: Policy Gradient -->
  <path d="M 80 340 L 100 325 L 130 280 Q 180 240 220 200 Q 260 170 300 180 Q 340 160 380 140 Q 420 130 460 145 Q 500 120 540 105 Q 580 115 620 95 Q 660 85 700 80 Q 740 78 780 72" stroke="#7c3aed" stroke-width="3" fill="none"/>
  <rect x="540" y="63" width="235" height="20" fill="white" rx="3"/>
  <text x="657" y="78" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="bold">范式三：策略梯度（潜力大但有波动）</text>

  <!-- PG annotations -->
  <circle cx="260" cy="200" r="5" fill="#7c3aed"/>
  <text x="260" y="218" text-anchor="middle" font-size="9" fill="#7c3aed">初期波动</text>
  <circle cx="460" cy="145" r="5" fill="#7c3aed"/>
  <text x="460" y="137" text-anchor="middle" font-size="9" fill="#7c3aed">过拟合恢复</text>

  <!-- Bottom note -->
  <text x="430" y="420" text-anchor="middle" font-size="10" fill="#64748b">范式三波动最大但长期趋势向上；范式二稳健但增长慢；范式一一步到位但到此为止</text>

  <!-- Legend -->
  <rect x="60" y="435" width="12" height="12" fill="#94a3b8" rx="2"/>
  <text x="78" y="447" font-size="9" fill="#64748b">SFT</text>
  <rect x="140" y="435" width="12" height="12" fill="#3b82f6" rx="2"/>
  <text x="158" y="447" font-size="9" fill="#64748b">范式一</text>
  <rect x="240" y="435" width="12" height="12" fill="#059669" rx="2"/>
  <text x="258" y="447" font-size="9" fill="#64748b">范式二</text>
  <rect x="340" y="435" width="12" height="12" fill="#7c3aed" rx="2"/>
  <text x="358" y="447" font-size="9" fill="#64748b">范式三</text>
</svg>
