<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="system-ui, -apple-system, sans-serif">
  <defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/></marker></defs>
  <rect width="860" height="520" fill="#f8fafc" rx="12"/>
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">Flow-GRPO 训练循环拆解</text>
  <text x="430" y="50" text-anchor="middle" font-size="11" fill="#64748b">把扩散/Flow 模型的去噪链看作 MDP，用 GRPO 做策略梯度更新</text>

  <!-- Step 1 -->
  <rect x="30" y="75" width="250" height="130" fill="white" stroke="#c084fc" stroke-width="2" rx="8"/>
  <rect x="30" y="75" width="250" height="28" fill="#f5f3ff" rx="8"/>
  <text x="155" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">Step 1：ODE → SDE 转换</text>
  <text x="50" y="120" font-size="9" fill="#475569">原始 Flow（确定性 ODE）：</text>
  <text x="50" y="138" font-size="9" fill="#64748b">dx = v_θ(x, t) dt</text>
  <text x="50" y="158" font-size="9" fill="#475569">加入少量噪声（SDE）：</text>
  <text x="50" y="176" font-size="9" fill="#64748b">dx = v_θ(x, t) dt + σ(t) dw</text>
  <text x="50" y="196" font-size="8" fill="#94a3b8">σ(t) 很小 → 质量几乎不变</text>

  <line x1="285" y1="140" x2="320" y2="140" stroke="#7c3aed" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Step 2 -->
  <rect x="325" y="75" width="250" height="130" fill="white" stroke="#c084fc" stroke-width="2" rx="8"/>
  <rect x="325" y="75" width="250" height="28" fill="#f5f3ff" rx="8"/>
  <text x="450" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">Step 2：采样一组轨迹</text>
  <text x="345" y="120" font-size="9" fill="#475569">对同一个场景/条件 c：</text>
  <text x="345" y="140" font-size="9" fill="#64748b">从 SDE 采样 G 条轨迹</text>
  <text x="345" y="158" font-size="9" fill="#64748b">τ₁, τ₂, ..., τ_G</text>
  <text x="345" y="178" font-size="9" fill="#475569">用奖励函数 R 打分：</text>
  <text x="345" y="196" font-size="9" fill="#64748b">R₁, R₂, ..., R_G</text>

  <line x1="580" y1="140" x2="615" y2="140" stroke="#7c3aed" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Step 3 -->
  <rect x="620" y="75" width="210" height="130" fill="white" stroke="#c084fc" stroke-width="2" rx="8"/>
  <rect x="620" y="75" width="210" height="28" fill="#f5f3ff" rx="8"/>
  <text x="725" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">Step 3：组内优势</text>
  <text x="640" y="120" font-size="9" fill="#475569">均值和方差：</text>
  <text x="640" y="140" font-size="9" fill="#64748b">μ = mean(R₁...R_G)</text>
  <text x="640" y="158" font-size="9" fill="#64748b">σ =  std(R₁...R_G)</text>
  <text x="640" y="180" font-size="9" fill="#475569">每个轨迹的优势：</text>
  <text x="640" y="198" font-size="9" fill="#64748b">A_i = (R_i - μ) / σ</text>

  <!-- Denoising Reduction section -->
  <rect x="30" y="225" width="800" height="90" fill="#f5f3ff" stroke="#c084fc" stroke-width="1.5" rx="8"/>
  <text x="430" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">Denoising Reduction：把 T 步的 log-prob 压缩成 1 步</text>

  <text x="50" y="272" font-size="9" fill="#475569">原始：log p_θ(τ) = Σ_{t=1}^{T} log p_θ(v_t | v_{t-1})  →  T 步梯度计算，太贵</text>
  <text x="50" y="292" font-size="9" fill="#475569">DR 近似：log p_θ(τ) ≈ (T / K) · Σ log p_θ(v_tk | v_t(k-1))  →  只算 K 步，K &lt;&lt; T</text>
  <text x="50" y="310" font-size="8" fill="#94a3b8">实际中 K=1~4 步就能近似 T=50~100 步的效果，训得快</text>

  <!-- Step 4 -->
  <line x1="430" y1="320" x2="430" y2="340" stroke="#7c3aed" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="30" y="345" width="800" height="100" fill="white" stroke="#c084fc" stroke-width="2" rx="8"/>
  <rect x="30" y="345" width="800" height="28" fill="#f5f3ff" rx="8"/>
  <text x="430" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c3aed">Step 4：GRPO 策略更新</text>

  <text x="50" y="392" font-size="10" fill="#475569">L_GRPO(θ) = -E[ min( ratio_i · A_i, clip(ratio_i, 1-ε, 1+ε) · A_i ) ]</text>
  <text x="50" y="412" font-size="10" fill="#64748b">其中 ratio_i = exp( log p_θ(τ_i | c) - log p_θ_old(τ_i | c) )</text>

  <text x="50" y="437" font-size="9" fill="#475569">好的轨迹（A_i &gt; 0）→ 提高生成概率 &#160;&#160;&#160; 差的轨迹（A_i &lt; 0）→ 降低生成概率</text>

  <!-- Loop back arrow -->
  <path d="M 810 395 Q 870 395 870 140 Q 870 80 840 80" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <text x="885" y="260" text-anchor="middle" font-size="9" fill="#94a3b8" transform="rotate(90, 885, 260)">迭代训练</text>

  <text x="430" y="510" text-anchor="middle" font-size="10" fill="#64748b">每次迭代，模型通过 SDE 采样 → 打分 → 组内归一化 → GRPO 梯度更新 → 模型变得更好</text>
</svg>
