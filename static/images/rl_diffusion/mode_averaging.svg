<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="system-ui, -apple-system, sans-serif">
  <defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/></marker></defs>
  <rect width="860" height="360" fill="#f8fafc" rx="12"/>
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">Mode Averaging：SFT 最隐蔽的问题</text>
  <text x="430" y="50" text-anchor="middle" font-size="11" fill="#64748b">当专家数据中有多条不同走法时，SFT 会取「平均」，而不是学会「多模态」</text>

  <!-- Left: Expert data -->
  <rect x="30" y="75" width="250" height="260" fill="white" stroke="#e2e8f0" rx="10"/>
  <text x="155" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">专家数据：两条不同路线</text>

  <path d="M 70 230 Q 100 170 140 155 Q 170 145 200 140 Q 230 135 260 130" stroke="#3b82f6" stroke-width="3" fill="none"/>
  <path d="M 70 240 Q 100 290 140 300 Q 170 305 200 310 Q 230 315 260 320" stroke="#f59e0b" stroke-width="3" fill="none"/>
  <circle cx="70" cy="235" r="5" fill="#64748b"/>
  <text x="155" y="340" text-anchor="middle" font-size="9" fill="#64748b">专家 1：绕左边走</text>
  <text x="155" y="355" text-anchor="middle" font-size="9" fill="#64748b">专家 2：绕右边走</text>

  <!-- Arrow -->
  <line x1="285" y1="205" x2="320" y2="205" stroke="#dc2626" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Right: SFT result -->
  <rect x="325" y="75" width="250" height="260" fill="white" stroke="#fca5a5" rx="10"/>
  <rect x="325" y="75" width="250" height="28" fill="#fef2f2" rx="10"/>
  <text x="450" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">SFT 学到的：取平均 → 直走</text>

  <path d="M 370 235 Q 410 220 450 220 Q 490 220 530 225" stroke="#dc2626" stroke-width="3" fill="none"/>
  <circle cx="370" cy="235" r="5" fill="#dc2626"/>
  <rect x="420" y="135" width="60" height="40" fill="#fca5a5" opacity="0.6" rx="4"/>
  <text x="450" y="158" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold">障碍物</text>

  <text x="450" y="340" text-anchor="middle" font-size="9" fill="#dc2626">结果：对着障碍物开（左右平均=直走）</text>

  <!-- Compare box -->
  <rect x="600" y="75" width="230" height="260" fill="#f0fdf4" stroke="#86efac" rx="10"/>
  <rect x="600" y="75" width="230" height="28" fill="#ecfdf5" rx="10"/>
  <text x="715" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669">RL 怎么做？</text>

  <text x="620" y="130" font-size="10" fill="#475569">RL 采样时，模型可以</text>
  <text x="620" y="148" font-size="10" fill="#475569">采样出 左转 和 右转</text>
  <text x="620" y="166" font-size="10" fill="#475569">两条不同的候选轨迹</text>
  <text x="620" y="196" font-size="10" font-weight="bold" fill="#059669">左转轨迹 → 奖励: 安全 ✓</text>
  <text x="620" y="216" font-size="10" font-weight="bold" fill="#059669">右转轨迹 → 奖励: 安全 ✓</text>
  <text x="620" y="246" font-size="10" fill="#b91c1c">直走轨迹 → 奖励: 碰撞 ✗</text>

  <text x="715" y="320" text-anchor="middle" font-size="10" font-weight="bold" fill="#059669">RL 保留多模态 → 选好的！！！</text>
</svg>
