<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="system-ui, -apple-system, sans-serif">
  <defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker></defs>
  <rect width="860" height="420" fill="#f8fafc" rx="12"/>
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">如何选择适合你的范式？</text>
  <text x="430" y="50" text-anchor="middle" font-size="11" fill="#64748b">根据你的团队情况、项目阶段和可用资源，选择最合适的路线</text>

  <!-- Start -->
  <rect x="345" y="70" width="170" height="40" fill="#475569" rx="20"/>
  <text x="430" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="white">你的项目是什么阶段？</text>

  <line x1="430" y1="110" x2="430" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>

  <!-- First split -->
  <path d="M 430 135 L 215 165 L 215 170" stroke="#64748b" stroke-width="2" fill="none"/>
  <path d="M 430 135 L 645 165 L 645 170" stroke="#64748b" stroke-width="2" fill="none"/>
  <text x="430" y="152" text-anchor="middle" font-size="9" fill="#64748b">刚起步 / 已有好模型</text>
  <text x="430" y="152" text-anchor="middle" font-size="9" fill="#64748b">追求突破 / 做研究</text>

  <!-- Left branch: Phase 1 -->
  <rect x="70" y="175" width="280" height="50" fill="white" stroke="#93c5fd" stroke-width="2" rx="8"/>
  <text x="210" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">Phase 1：范式一（推理时引导）</text>
  <text x="210" y="215" text-anchor="middle" font-size="9" fill="#64748b">不改模型，快速看到 RL 效果</text>

  <line x1="210" y1="225" x2="210" y2="245" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="70" y="250" width="280" height="50" fill="white" stroke="#6ee7b7" stroke-width="2" rx="8"/>
  <text x="210" y="273" text-anchor="middle" font-size="11" font-weight="bold" fill="#059669">Phase 2：范式二（拒绝采样 RFT）</text>
  <text x="210" y="290" text-anchor="middle" font-size="9" fill="#64748b">简单稳定，效果显著</text>

  <line x1="210" y1="300" x2="210" y2="320" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="70" y="325" width="280" height="50" fill="white" stroke="#c084fc" stroke-width="1.5" rx="8"/>
  <text x="210" y="348" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">Phase 3：范式三（策略梯度）</text>
  <text x="210" y="365" text-anchor="middle" font-size="9" fill="#64748b">追求超越 SFT 的质变</text>

  <!-- Right branch -->
  <rect x="510" y="175" width="280" height="50" fill="white" stroke="#c084fc" stroke-width="2" rx="8"/>
  <text x="650" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">范式三：策略梯度（Flow-GRPO/DPO）</text>
  <text x="650" y="215" text-anchor="middle" font-size="9" fill="#64748b">资源充足，追求上限</text>

  <line x1="650" y1="225" x2="650" y2="245" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="510" y="250" width="280" height="50" fill="white" stroke="#fbbf24" stroke-width="2" rx="8"/>
  <text x="650" y="273" text-anchor="middle" font-size="11" font-weight="bold" fill="#d97706">范式四：世界模型 + RL</text>
  <text x="650" y="290" text-anchor="middle" font-size="9" fill="#64748b">长期规划，需要大量资源</text>

  <!-- Bottom note -->
  <rect x="30" y="395" width="800" height="1" fill="#e2e8f0"/>
  <text x="430" y="415" text-anchor="middle" font-size="10" fill="#64748b">核心建议：从简单开始 → 看效果 → 逐步升级，不要一上来就挑战范式三/四</text>
</svg>
