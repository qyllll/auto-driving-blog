<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="system-ui, -apple-system, sans-serif">
  <rect width="860" height="400" fill="#f8fafc" rx="12"/>
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">PDMS 公式拆解：分数是怎么算出来的？</text>
  <text x="430" y="50" text-anchor="middle" font-size="11" fill="#64748b">理解分数结构是刷分的第一步——每一个子指标都是一个可以优化的方向</text>

  <!-- Formula structure -->
  <rect x="40" y="75" width="780" height="100" fill="white" stroke="#e2e8f0" rx="10"/>
  <text x="430" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">PDMS =</text>

  <!-- Multiplicative part -->
  <rect x="60" y="110" width="340" height="50" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" rx="8"/>
  <text x="230" y="134" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">NC × DAC</text>
  <text x="230" y="152" text-anchor="middle" font-size="9" fill="#dc2626">乘性惩罚：一个为零则整体为零</text>

  <text x="430" y="140" text-anchor="middle" font-size="18" fill="#64748b">×</text>

  <!-- Additive part -->
  <rect x="460" y="110" width="360" height="50" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" rx="8"/>
  <text x="640" y="134" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563eb">(5·EP + 5·TTC + 2·C) / 12</text>
  <text x="640" y="152" text-anchor="middle" font-size="9" fill="#2563eb">加权平均：鼓励前进 + 安全 + 舒适</text>

  <!-- Sub-metrics detail -->
  <rect x="40" y="190" width="780" height="190" fill="white" stroke="#e2e8f0" rx="10"/>
  <text x="430" y="213" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">每个子指标的含义与得分策略</text>

  <!-- NC -->
  <rect x="55" y="225" width="175" height="70" fill="white" stroke="#fca5a5" rx="6"/>
  <text x="142" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">NC 无责碰撞</text>
  <text x="142" y="263" text-anchor="middle" font-size="9" fill="#475569">乘性，取值 {0, 0.5, 1}</text>
  <text x="142" y="280" text-anchor="middle" font-size="9" fill="#64748b">碰撞 = 整段归零</text>

  <!-- DAC -->
  <rect x="240" y="225" width="175" height="70" fill="white" stroke="#fca5a5" rx="6"/>
  <text x="327" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">DAC 可行驶区域</text>
  <text x="327" y="263" text-anchor="middle" font-size="9" fill="#475569">乘性，取值 {0, 1}</text>
  <text x="327" y="280" text-anchor="middle" font-size="9" fill="#64748b">出车道 = 归零</text>

  <!-- EP -->
  <rect x="55" y="305" width="175" height="60" fill="#eff6ff" stroke="#93c5fd" rx="6"/>
  <text x="142" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">EP 前进量</text>
  <text x="142" y="343" text-anchor="middle" font-size="9" fill="#64748b">权重 5，连续值 [0, 1]</text>

  <!-- TTC -->
  <rect x="240" y="305" width="175" height="60" fill="#eff6ff" stroke="#93c5fd" rx="6"/>
  <text x="327" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">TTC 碰撞时间</text>
  <text x="327" y="343" text-anchor="middle" font-size="9" fill="#64748b">权重 5，离散 {0, 1}</text>

  <!-- C -->
  <rect x="425" y="305" width="175" height="60" fill="#eff6ff" stroke="#93c5fd" rx="6"/>
  <text x="512" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">C 舒适度</text>
  <text x="512" y="343" text-anchor="middle" font-size="9" fill="#64748b">权重 2，离散 {0, 1}</text>

  <!-- Key insight box -->
  <rect x="610" y="225" width="200" height="140" fill="#f0fdf4" stroke="#86efac" rx="8"/>
  <text x="710" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#059669">关键洞察</text>
  <text x="625" y="272" font-size="9" fill="#475569">90分以上时：</text>
  <text x="625" y="292" font-size="9" fill="#475569">NC、DAC、TTC、C</text>
  <text x="625" y="310" font-size="9" fill="#475569">全部接近满分</text>
  <text x="625" y="335" font-size="9" font-weight="bold" fill="#059669">唯一差距：EP！</text>
  <text x="625" y="355" font-size="9" fill="#64748b">EP 从 0.85→0.95</text>
  <text x="625" y="365" font-size="9" fill="#64748b">PDMS 涨 2-3 分</text>
</svg>
