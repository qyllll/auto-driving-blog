<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-right" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#f1f5f9"/></linearGradient>
  </defs>
  <rect width="920" height="600" fill="url(#bg)" rx="14"/>

  <text x="460" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">强化学习 × 生成式轨迹：四大范式总览</text>
  <text x="460" y="52" text-anchor="middle" font-size="12" fill="#64748b">从「模仿专家」到「自我改进」—— 强化学习让生成式轨迹规划突破 SFT 天花板</text>

  <!-- === SFT baseline (left side) === -->
  <rect x="40" y="80" width="200" height="100" fill="white" stroke="#94a3b8" stroke-width="1.5" rx="10"/>
  <text x="140" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">SFT 模仿学习</text>
  <text x="140" y="125" text-anchor="middle" font-size="11" fill="#64748b">端到端行为克隆</text>
  <text x="140" y="145" text-anchor="middle" font-size="11" fill="#64748b">看专家数据 → 学动作</text>
  <text x="140" y="168" text-anchor="middle" font-size="10" fill="#94a3b8">天花板 = 专家平均水平</text>

  <line x1="245" y1="130" x2="290" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-right)" stroke-dasharray="4,3"/>

  <!-- Center question -->
  <rect x="295" y="85" width="180" height="90" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" rx="12"/>
  <text x="385" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">如何超越专家？</text>
  <text x="385" y="135" text-anchor="middle" font-size="11" fill="#64748b">引入奖励信号</text>
  <text x="385" y="155" text-anchor="middle" font-size="11" fill="#64748b">让模型自我改进</text>

  <line x1="480" y1="130" x2="530" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-right)"/>

  <!-- Four paradigms title -->
  <text x="700" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">RL × 生成的四种范式</text>

  <!-- Paradigm 1 -->
  <rect x="500" y="105" width="210" height="75" fill="white" stroke="#93c5fd" stroke-width="2" rx="8"/>
  <rect x="500" y="105" width="210" height="26" fill="#eff6ff" rx="8"/>
  <text x="605" y="124" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">范式一：推理时奖励引导</text>
  <text x="605" y="148" text-anchor="middle" font-size="10" fill="#475569">训练好的模型 + 推理时用</text>
  <text x="605" y="165" text-anchor="middle" font-size="10" fill="#475569">reward/cost 引导采样方向</text>
  <text x="605" y="178" text-anchor="middle" font-size="9" fill="#94a3b8">Diffusion Planner, CTG++</text>

  <!-- Paradigm 2 -->
  <rect x="720" y="105" width="180" height="75" fill="white" stroke="#6ee7b7" stroke-width="2" rx="8"/>
  <rect x="720" y="105" width="180" height="26" fill="#ecfdf5" rx="8"/>
  <text x="810" y="124" text-anchor="middle" font-size="11" font-weight="bold" fill="#059669">范式二：拒绝采样微调</text>
  <text x="810" y="148" text-anchor="middle" font-size="10" fill="#475569">采样多条 → 打分 → 挑好的</text>
  <text x="810" y="165" text-anchor="middle" font-size="10" fill="#475569">当正样本继续训</text>
  <text x="810" y="178" text-anchor="middle" font-size="9" fill="#94a3b8">AutoVLA RFT</text>

  <!-- Paradigm 3 -->
  <rect x="500" y="195" width="210" height="75" fill="white" stroke="#c084fc" stroke-width="2" rx="8"/>
  <rect x="500" y="195" width="210" height="26" fill="#f5f3ff" rx="8"/>
  <text x="605" y="214" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">范式三：策略梯度优化</text>
  <text x="605" y="238" text-anchor="middle" font-size="10" fill="#475569">直接对生成目标算策略梯度</text>
  <text x="605" y="255" text-anchor="middle" font-size="10" fill="#475569">PPO / GRPO / DPO 框架</text>
  <text x="605" y="268" text-anchor="middle" font-size="9" fill="#94a3b8">Flow-GRPO, DPO for Diffusion</text>

  <!-- Paradigm 4 -->
  <rect x="720" y="195" width="180" height="75" fill="white" stroke="#fbbf24" stroke-width="2" rx="8"/>
  <rect x="720" y="195" width="180" height="26" fill="#fef3c7" rx="8"/>
  <text x="810" y="214" text-anchor="middle" font-size="11" font-weight="bold" fill="#d97706">范式四：世界模型 + RL</text>
  <text x="810" y="238" text-anchor="middle" font-size="10" fill="#475569">世界模型做 rollout 环境</text>
  <text x="810" y="255" text-anchor="middle" font-size="10" fill="#475569">生成模型做策略</text>
  <text x="810" y="268" text-anchor="middle" font-size="9" fill="#94a3b8">DriveVLA-W0, Dreamer</text>

  <!-- Divider line -->
  <line x1="40" y1="310" x2="880" y2="310" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Bottom: Key dimensions comparison -->
  <text x="460" y="345" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">关键维度对比</text>

  <g font-size="11">
    <!-- Column headers -->
    <rect x="50" y="365" width="160" height="32" fill="#f1f5f9" rx="4"/>
    <rect x="230" y="365" width="150" height="32" fill="#eff6ff" rx="4"/>
    <rect x="390" y="365" width="150" height="32" fill="#ecfdf5" rx="4"/>
    <rect x="550" y="365" width="150" height="32" fill="#f5f3ff" rx="4"/>
    <rect x="710" y="365" width="160" height="32" fill="#fef3c7" rx="4"/>
    <text x="130" y="387" text-anchor="middle" font-weight="bold" fill="#475569">维度</text>
    <text x="305" y="387" text-anchor="middle" font-weight="bold" fill="#2563eb">范式一</text>
    <text x="465" y="387" text-anchor="middle" font-weight="bold" fill="#059669">范式二</text>
    <text x="625" y="387" text-anchor="middle" font-weight="bold" fill="#7c3aed">范式三</text>
    <text x="790" y="387" text-anchor="middle" font-weight="bold" fill="#d97706">范式四</text>

    <!-- Row 1 -->
    <text x="60" y="425" fill="#475569">需不需要奖励模型</text>
    <text x="305" y="425" text-anchor="middle" fill="#2563eb">需要（cost func）</text>
    <text x="465" y="425" text-anchor="middle" fill="#059669">需要（规则奖励）</text>
    <text x="625" y="425" text-anchor="middle" fill="#7c3aed">需要（reward model）</text>
    <text x="790" y="425" text-anchor="middle" fill="#d97706">需要（世界模型）</text>

    <!-- Row 2 -->
    <text x="60" y="460" fill="#475569">改不改模型权重</text>
    <text x="305" y="460" text-anchor="middle" fill="#2563eb">否（推理时引导）</text>
    <text x="465" y="460" text-anchor="middle" fill="#059669">是（SFT 再训练）</text>
    <text x="625" y="460" text-anchor="middle" fill="#7c3aed">是（策略梯度）</text>
    <text x="790" y="460" text-anchor="middle" fill="#d97706">是（联合训练）</text>

    <!-- Row 3 -->
    <text x="60" y="495" fill="#475569">实现难度</text>
    <text x="305" y="495" text-anchor="middle" fill="#2563eb">低（不改模型）</text>
    <text x="465" y="495" text-anchor="middle" fill="#059669">低（退化到 SFT）</text>
    <text x="625" y="495" text-anchor="middle" fill="#7c3aed">高（log-prob 难算）</text>
    <text x="790" y="495" text-anchor="middle" fill="#d97706">高（训世界模型）</text>

    <!-- Row 4 -->
    <text x="60" y="530" fill="#475569">性能上限</text>
    <text x="305" y="530" text-anchor="middle" fill="#2563eb">有限（受预训练限）</text>
    <text x="465" y="530" text-anchor="middle" fill="#059669">中等</text>
    <text x="625" y="530" text-anchor="middle" fill="#7c3aed">高</text>
    <text x="790" y="530" text-anchor="middle" fill="#d97706">最高（可长远规划）</text>

    <!-- Row 5 -->
    <text x="60" y="565" fill="#475569">训飞风险</text>
    <text x="305" y="565" text-anchor="middle" fill="#2563eb">无（不改权重）</text>
    <text x="465" y="565" text-anchor="middle" fill="#059669">低</text>
    <text x="625" y="565" text-anchor="middle" fill="#7c3aed">高（reward hacking）</text>
    <text x="790" y="565" text-anchor="middle" fill="#d97706">中（世界模型偏差）</text>
  </g>
</svg>
