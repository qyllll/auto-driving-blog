<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="system-ui, -apple-system, sans-serif">
  <rect width="860" height="400" fill="#f8fafc" rx="12"/>
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">PDMS 90 分的秘密：子指标分解</text>
  <text x="430" y="50" text-anchor="middle" font-size="11" fill="#64748b">从 80→85→90→94.5，每个分数段在优化什么？</text>

  <!-- Score bands -->
  <rect x="30" y="75" width="190" height="200" fill="white" stroke="#fca5a5" stroke-width="2" rx="8"/>
  <rect x="30" y="75" width="190" height="30" fill="#fef2f2" rx="8"/>
  <text x="125" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">PDMS &lt; 80</text>
  <text x="45" y="130" font-size="10" fill="#475569">主要问题：</text>
  <text x="45" y="150" font-size="9" fill="#b91c1c">• 频繁碰撞（NC低）</text>
  <text x="45" y="170" font-size="9" fill="#b91c1c">• 经常出车道（DAC低）</text>
  <text x="45" y="190" font-size="9" fill="#b91c1c">• EP接近0（不动/乱动）</text>
  <text x="45" y="215" font-size="9" fill="#475569">解决方向：</text>
  <text x="45" y="235" font-size="9" fill="#64748b">先学会"正常开车"</text>
  <text x="45" y="255" font-size="9" fill="#64748b">用 SFT 做模仿学习</text>

  <rect x="230" y="75" width="190" height="200" fill="white" stroke="#fbbf24" stroke-width="2" rx="8"/>
  <rect x="230" y="75" width="190" height="30" fill="#fef3c7" rx="8"/>
  <text x="325" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97706">80 ≤ PDMS &lt; 88</text>
  <text x="245" y="130" font-size="10" fill="#475569">主要问题：</text>
  <text x="245" y="150" font-size="9" fill="#b45309">• 偶尔碰撞/压线</text>
  <text x="245" y="170" font-size="9" fill="#b45309">• 前进量中等（EP~0.7）</text>
  <text x="245" y="190" font-size="9" fill="#b45309">• 舒适度不稳定</text>
  <text x="245" y="215" font-size="9" fill="#475569">解决方向：</text>
  <text x="245" y="235" font-size="9" fill="#64748b">提EP+降碰撞</text>
  <text x="245" y="255" font-size="9" fill="#64748b">Scoring-based方法</text>

  <rect x="430" y="75" width="190" height="200" fill="white" stroke="#93c5fd" stroke-width="2" rx="8"/>
  <rect x="430" y="75" width="190" height="30" fill="#eff6ff" rx="8"/>
  <text x="525" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">88 ≤ PDMS &lt; 92</text>
  <text x="445" y="130" font-size="10" fill="#475569">主要瓶颈：</text>
  <text x="445" y="150" font-size="9" fill="#1d4ed8">• TTC偶尔不足</text>
  <text x="445" y="170" font-size="9" fill="#1d4ed8">• EP在0.75~0.85徘徊</text>
  <text x="445" y="190" font-size="9" fill="#1d4ed8">• 候选轨迹多样性不足</text>
  <text x="445" y="215" font-size="9" fill="#475569">解决方向：</text>
  <text x="445" y="235" font-size="9" fill="#64748b">候选集覆盖 + 打分器</text>
  <text x="445" y="255" font-size="9" fill="#64748b">闭环自蒸馏训练</text>

  <rect x="630" y="75" width="200" height="200" fill="white" stroke="#6ee7b7" stroke-width="2" rx="8"/>
  <rect x="630" y="75" width="200" height="30" fill="#ecfdf5" rx="8"/>
  <text x="730" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669">92 ≤ PDMS &lt; 95</text>
  <text x="645" y="130" font-size="10" fill="#475569">唯一瓶颈：</text>
  <text x="645" y="150" font-size="9" fill="#15803d">• 安全分全部拉满</text>
  <text x="645" y="170" font-size="9" fill="#15803d">• 舒适度满分</text>
  <text x="645" y="190" font-size="9" font-weight="bold" fill="#059669">只有EP还能提升</text>
  <text x="645" y="215" font-size="9" fill="#475569">解决方向：</text>
  <text x="645" y="235" font-size="9" fill="#64748b">EP从0.85→0.95</text>
  <text x="645" y="255" font-size="9" fill="#64748b">CLOVER的闭式蒸馏</text>

  <!-- Bottom insight -->
  <rect x="30" y="290" width="800" height="90" fill="#f8fafc" stroke="#e2e8f0" rx="8"/>
  <text x="430" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">核心认识：不同分数段的瓶颈完全不同，策略也要跟着换</text>

  <text x="100" y="345" text-anchor="middle" font-size="10" fill="#dc2626">&lt;80 分：学开车</text>
  <text x="200" y="345" text-anchor="middle" font-size="16" fill="#94a3b8">→</text>
  <text x="310" y="345" text-anchor="middle" font-size="10" fill="#d97706">80-88：提EP</text>
  <text x="390" y="345" text-anchor="middle" font-size="16" fill="#94a3b8">→</text>
  <text x="500" y="345" text-anchor="middle" font-size="10" fill="#2563eb">88-92：优化候选+打分</text>
  <text x="590" y="345" text-anchor="middle" font-size="16" fill="#94a3b8">→</text>
  <text x="700" y="345" text-anchor="middle" font-size="10" fill="#059669">92+：极致EP</text>

  <text x="430" y="375" text-anchor="middle" font-size="10" fill="#64748b">SFT → Scoring-based → 蒸馏强化 → 闭环自蒸馏（CLOVER）</text>
</svg>
