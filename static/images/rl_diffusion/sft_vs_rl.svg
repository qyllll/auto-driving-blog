<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" font-family="system-ui, -apple-system, sans-serif">
  <rect width="860" height="380" fill="#f8fafc" rx="12"/>
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">为什么 SFT 不够，还需要 RL？</text>

  <!-- SFT side -->
  <rect x="30" y="60" width="380" height="290" fill="white" stroke="#fca5a5" stroke-width="2" rx="10"/>
  <rect x="30" y="60" width="380" height="32" fill="#fef2f2" rx="10"/>
  <text x="220" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">SFT 模仿学习的问题</text>

  <text x="60" y="115" font-size="11" font-weight="bold" fill="#b91c1c">① 只会模仿，不会判断好坏</text>
  <text x="60" y="133" font-size="10" fill="#64748b">所有专家数据都照单全收，好坏不分</text>

  <text x="60" y="163" font-size="11" font-weight="bold" fill="#b91c1c">② Mode Averaging（平均化）</text>
  <text x="60" y="181" font-size="10" fill="#64748b">多个合理动作时选"平均"的那个</text>
  <text x="60" y="196" font-size="10" fill="#64748b">等于压着障碍物中间走</text>

  <text x="60" y="226" font-size="11" font-weight="bold" fill="#b91c1c">③ 天花板 = 专家平均水平</text>
  <text x="60" y="244" font-size="10" fill="#64748b">永远无法超越训练数据质量</text>

  <!-- Mode averaging illustration -->
  <rect x="60" y="258" width="160" height="70" fill="#fef2f2" stroke="#fecaca" rx="6"/>
  <text x="140" y="277" text-anchor="middle" font-size="9" fill="#dc2626">专家左转</text>
  <text x="140" y="295" text-anchor="middle" font-size="9" fill="#dc2626">专家右转</text>
  <text x="140" y="313" text-anchor="middle" font-size="9" font-weight="bold" fill="#b91c1c">SFT: 直走（平均）→ 撞了</text>

  <!-- RL side -->
  <rect x="450" y="60" width="380" height="290" fill="white" stroke="#6ee7b7" stroke-width="2" rx="10"/>
  <rect x="450" y="60" width="380" height="32" fill="#ecfdf5" rx="10"/>
  <text x="640" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">RL 如何解决</text>

  <text x="480" y="115" font-size="11" font-weight="bold" fill="#15803d">① 引入奖励信号</text>
  <text x="480" y="133" font-size="10" fill="#64748b">奖励告诉模型什么是"好"什么是"坏"</text>

  <text x="480" y="163" font-size="11" font-weight="bold" fill="#15803d">② 多模态保留</text>
  <text x="480" y="181" font-size="10" fill="#64748b">生成式模型天然多模态</text>
  <text x="480" y="196" font-size="10" fill="#64748b">RL 从多模态中选出好的那些</text>

  <text x="480" y="226" font-size="11" font-weight="bold" fill="#15803d">③ 可以超越专家</text>
  <text x="480" y="244" font-size="10" fill="#64748b">模型自己探索试错</text>
  <text x="480" y="259" font-size="10" fill="#64748b">发现训练数据里没见过的 better policy</text>

  <!-- RL illustration -->
  <rect x="480" y="270" width="160" height="60" fill="#f0fdf4" stroke="#86efac" rx="6"/>
  <text x="560" y="289" text-anchor="middle" font-size="9" fill="#059669">采样多条轨迹</text>
  <text x="560" y="305" text-anchor="middle" font-size="9" fill="#059669">奖励挑最好的学</text>
  <text x="560" y="321" text-anchor="middle" font-size="9" font-weight="bold" fill="#15803d">→ 比专家更优</text>

  <!-- Arrow between -->
  <line x1="415" y1="205" x2="445" y2="205" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker>
  </defs>
</svg>
