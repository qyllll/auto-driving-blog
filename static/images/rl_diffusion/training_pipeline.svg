<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="system-ui, -apple-system, sans-serif">
  <rect width="860" height="500" fill="#f8fafc" rx="12"/>
  <text x="430" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">从 SFT 到 CLOVER：90+ 的训练管线</text>
  <text x="430" y="48" text-anchor="middle" font-size="11" fill="#64748b">四条管线逐步递进，每一步都在解决前一步的瓶颈</text>

  <!-- Arrow guide -->
  <line x1="200" y1="60" x2="200" y2="80" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 1: SFT -->
  <rect x="20" y="75" width="250" height="85" fill="white" stroke="#94a3b8" stroke-width="1.5" rx="8"/>
  <rect x="20" y="75" width="250" height="24" fill="#f1f5f9" rx="8"/>
  <text x="145" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">第1步：SFT 模仿学习</text>
  <text x="35" y="118" font-size="9" fill="#475569">目标：让模型学会"正常开车"</text>
  <text x="35" y="136" font-size="9" fill="#475569">数据：Human log + Navtrain</text>
  <text x="35" y="152" font-size="9" fill="#64748b">预期 PDMS：75-82</text>

  <text x="145" y="185" text-anchor="middle" font-size="14" fill="#94a3b8">↓</text>

  <!-- Step 2: Scoring-based -->
  <rect x="20" y="195" width="250" height="100" fill="white" stroke="#93c5fd" stroke-width="1.5" rx="8"/>
  <rect x="20" y="195" width="250" height="24" fill="#eff6ff" rx="8"/>
  <text x="145" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">第2步：Scoring-based</text>
  <text x="35" y="238" font-size="9" fill="#475569">训练打分器 + 候选生成器</text>
  <text x="35" y="256" font-size="9" fill="#475569">NC、TTC 等安全指标拉满</text>
  <text x="35" y="274" font-size="9" fill="#475569">EP 提升到 ~0.85</text>
  <text x="35" y="290" font-size="9" fill="#64748b">预期 PDMS：82-88</text>

  <text x="145" y="320" text-anchor="middle" font-size="14" fill="#94a3b8">↓</text>

  <!-- Step 3: Distillation -->
  <rect x="20" y="330" width="250" height="100" fill="white" stroke="#c084fc" stroke-width="1.5" rx="8"/>
  <rect x="20" y="330" width="250" height="24" fill="#f5f3ff" rx="8"/>
  <text x="145" y="348" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">第3步：蒸馏优化</text>
  <text x="35" y="373" font-size="9" fill="#475569">闭式蒸馏（CLOVER）</text>
  <text x="35" y="391" font-size="9" fill="#475569">候选质量大幅提升</text>
  <text x="35" y="409" font-size="9" fill="#475569">EP 从 0.85 → 0.93</text>
  <text x="35" y="425" font-size="9" fill="#64748b">预期 PDMS：90-94.5</text>

  <!-- Side notes -->
  <rect x="300" y="75" width="250" height="85" fill="#f8fafc" stroke="#e2e8f0" rx="8"/>
  <text x="425" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">关键选择</text>
  <text x="315" y="118" font-size="9" fill="#475569">• 数据质量 &gt; 数量</text>
  <text x="315" y="136" font-size="9" fill="#475569">• Navtrain 场景 vs 全量</text>
  <text x="315" y="152" font-size="9" fill="#64748b">• 是否用 Navtest 验证</text>

  <rect x="300" y="195" width="250" height="100" fill="#f8fafc" stroke="#e2e8f0" rx="8"/>
  <text x="425" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">常见问题</text>
  <text x="315" y="238" font-size="9" fill="#475569">• 打分器过拟合</text>
  <text x="315" y="256" font-size="9" fill="#475569">• 候选退化模式</text>
  <text x="315" y="274" font-size="9" fill="#475569">• EP-CAV 差距</text>
  <text x="315" y="290" font-size="9" fill="#64748b">• 难例相关性</text>

  <rect x="300" y="330" width="250" height="100" fill="#f8fafc" stroke="#e2e8f0" rx="8"/>
  <text x="425" y="353" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">CLOVER 的精髓</text>
  <text x="315" y="373" font-size="9" fill="#475569">• 打分器训练生成器</text>
  <text x="315" y="391" font-size="9" fill="#475569">• 在线自蒸馏不断迭代</text>
  <text x="315" y="409" font-size="9" fill="#475569">• 同时提升 EP 和满意度</text>
  <text x="315" y="425" font-size="9" fill="#64748b">• 单阶段方案</text>

  <!-- Right panel -->
  <rect x="580" y="75" width="250" height="355" fill="white" stroke="#fbbf24" stroke-width="2" rx="10"/>
  <rect x="580" y="75" width="250" height="30" fill="#fef3c7" rx="10"/>
  <text x="705" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#d97706">PDMS 对应策略</text>

  <text x="600" y="130" font-size="9" font-weight="bold" fill="#475569">PDMS &lt; 80</text>
  <text x="600" y="148" font-size="8" fill="#64748b">SFT + 数据清洗</text>

  <line x1="600" y1="160" x2="810" y2="160" stroke="#e2e8f0" stroke-width="1"/>

  <text x="600" y="180" font-size="9" font-weight="bold" fill="#475569">PDMS 80-85</text>
  <text x="600" y="198" font-size="8" fill="#64748b">Scoring-based + 基础打分器</text>

  <line x1="600" y1="210" x2="810" y2="210" stroke="#e2e8f0" stroke-width="1"/>

  <text x="600" y="230" font-size="9" font-weight="bold" fill="#475569">PDMS 85-88</text>
  <text x="600" y="248" font-size="8" fill="#64748b">增加候选多样性 + 蒸馏</text>

  <line x1="600" y1="260" x2="810" y2="260" stroke="#e2e8f0" stroke-width="1"/>

  <text x="600" y="280" font-size="9" font-weight="bold" fill="#475569">PDMS 88-92</text>
  <text x="600" y="298" font-size="8" fill="#64748b">闭环自蒸馏 + RL</text>
  <text x="600" y="316" font-size="8" fill="#64748b">候选生成与打分器联合优化</text>

  <line x1="600" y1="330" x2="810" y2="330" stroke="#e2e8f0" stroke-width="1"/>

  <text x="600" y="350" font-size="9" font-weight="bold" fill="#475569">PDMS 92+</text>
  <text x="600" y="368" font-size="8" fill="#64748b">CLOVER 闭式蒸馏</text>
  <text x="600" y="386" font-size="8" fill="#64748b">极致 EP 优化</text>
  <text x="600" y="404" font-size="8" fill="#64748b">数据 + 策略双提升</text>

  <!-- Bottom note -->
  <rect x="20" y="455" width="810" height="35" fill="#f0fdf4" stroke="#86efac" rx="6"/>
  <text x="425" y="475" text-anchor="middle" font-size="10" fill="#059669">如果你只有时间做一件事：先搞定候选质量，再优化打分器——方向比努力更重要</text>
</svg>
