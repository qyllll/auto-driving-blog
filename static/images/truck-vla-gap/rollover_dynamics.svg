<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <marker id="arrowForce" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e74c3c"/>
    </marker>
  </defs>

  <rect width="900" height="550" fill="url(#bgGrad)" rx="12"/>

  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">重卡侧翻动力学与 VLA 的接口设计</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#888">VLA 模型必须理解侧翻物理机制，才能生成动力学安全的轨迹</text>

  <!-- Left: Rollover diagram -->
  <rect x="30" y="75" width="420" height="320" fill="#fff" rx="10" stroke="#bdc3c7" stroke-width="1"/>
  <text x="240" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">过弯时重卡的受力分析</text>

  <!-- truck body -->
  <rect x="120" y="180" width="250" height="60" fill="#e74c3c" rx="5" opacity="0.8"/>
  <text x="245" y="215" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">重卡车身 (簧上质量)</text>

  <!-- suspension -->
  <line x1="160" y1="240" x2="160" y2="275" stroke="#555" stroke-width="3"/>
  <line x1="330" y1="240" x2="330" y2="275" stroke="#555" stroke-width="3"/>
  <line x1="155" y1="260" x2="165" y2="260" stroke="#f39c12" stroke-width="2"/>
  <text x="150" y="270" text-anchor="end" font-size="9" fill="#f39c12">弹簧</text>

  <!-- wheels -->
  <rect x="130" y="275" width="40" height="25" fill="#333" rx="4"/>
  <rect x="320" y="275" width="40" height="25" fill="#333" rx="4"/>

  <!-- ground -->
  <line x1="60" y1="300" x2="420" y2="275" stroke="#7f8c8d" stroke-width="2"/>
  <text x="430" y="278" font-size="10" fill="#7f8c8d">路面</text>

  <!-- CG marker -->
  <circle cx="245" cy="175" r="6" fill="#e74c3c"/>
  <text x="245" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c">CG</text>
  <line x1="245" y1="175" x2="245" y2="300" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="255" y="240" font-size="10" fill="#e74c3c">h (质心高度)</text>
  <line x1="150" y1="290" x2="340" y2="283" stroke="#3498db" stroke-width="1.5"/>
  <text x="245" y="305" text-anchor="middle" font-size="10" fill="#3498db">轮距 d</text>

  <!-- Forces -->
  <!-- Centrifugal force -->
  <line x1="245" y1="175" x2="310" y2="175" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowForce)"/>
  <text x="310" y="170" font-size="12" font-weight="bold" fill="#e74c3c">F_c = mv²/r</text>

  <!-- Gravity -->
  <line x1="245" y1="175" x2="245" y2="220" stroke="#8e44ad" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="235" y="235" font-size="11" font-weight="bold" fill="#8e44ad">mg</text>

  <!-- Roll angle -->
  <path d="M 200 245 A 10 10 0 0 1 195 238" fill="none" stroke="#27ae60" stroke-width="1.5"/>
  <text x="175" y="245" font-size="10" fill="#27ae60">φ</text>

  <!-- LTR formula box -->
  <rect x="60" y="335" width="360" height="50" fill="#fef9e7" rx="8" stroke="#f39c12" stroke-width="1.5"/>
  <text x="240" y="357" text-anchor="middle" font-size="14" font-weight="bold" fill="#d68910">LTR = (F_left - F_right) / (F_left + F_right)</text>
  <text x="240" y="375" text-anchor="middle" font-size="11" fill="#888">LTR = 0 稳 ← LTR = ±1 即将侧翻 → LTR gt; 1 已翻车</text>

  <!-- Right: How VLA should encode rollover -->
  <rect x="470" y="75" width="400" height="320" fill="#fff" rx="10" stroke="#bdc3c7" stroke-width="1"/>
  <text x="670" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">VLA 应如何融合侧翻风险？</text>

  <!-- Architecture boxes -->
  <rect x="490" y="120" width="360" height="42" fill="#d5f5e3" rx="6" stroke="#27ae60" stroke-width="1"/>
  <text x="670" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">视觉编码器 → 多视角图片 → BEV/语义特征</text>

  <rect x="490" y="172" width="360" height="42" fill="#d5f5e3" rx="6" stroke="#27ae60" stroke-width="1"/>
  <text x="670" y="192" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">语言编码器 → 导航指令 + 场景描述</text>

  <rect x="490" y="224" width="360" height="42" fill="#fadbd8" rx="6" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="670" y="244" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">状态编码器 (新增！) → 载荷/CG/侧翻指数</text>

  <!-- State inputs -->
  <rect x="510" y="278" width="105" height="32" fill="#fef9e7" rx="4" stroke="#f39c12" stroke-width="1"/>
  <text x="562" y="299" text-anchor="middle" font-size="10" fill="#d68910">⚖️ 轴荷传感器</text>

  <rect x="625" y="278" width="105" height="32" fill="#fef9e7" rx="4" stroke="#f39c12" stroke-width="1"/>
  <text x="677" y="299" text-anchor="middle" font-size="10" fill="#d68910">🎯 CG 估计</text>

  <rect x="740" y="278" width="95" height="32" fill="#fef9e7" rx="4" stroke="#f39c12" stroke-width="1"/>
  <text x="787" y="299" text-anchor="middle" font-size="10" fill="#d68910">🔄 挂车角</text>

  <!-- Arrow down to action -->
  <polygon points="670,320 655,320 670,335 685,320" fill="#e74c3c"/>

  <rect x="490" y="340" width="360" height="45" fill="#eaf2f8" rx="6" stroke="#3498db" stroke-width="1"/>
  <text x="670" y="358" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">VLA 动作头 (轨迹/控制) + 侧翻约束</text>
  <text x="670" y="375" text-anchor="middle" font-size="10" fill="#888">输出轨迹必须满足 LTR &lt; 0.6 或 NRS &gt; 80 的安全边界</text>

  <!-- Bottom note -->
  <rect x="30" y="410" width="840" height="125" fill="#fff" rx="10" stroke="#7f8c8d" stroke-width="1"/>
  <text x="450" y="435" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">关键问题：现有 VLA 的动作空间设计</text>

  <rect x="50" y="450" width="250" height="75" fill="#fadbd8" rx="6" stroke="#e74c3c" stroke-width="1"/>
  <text x="175" y="472" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">当前 VLA 动作空间</text>
  <text x="60" y="490" font-size="11" fill="#555">• 离散路径点 (x, y, θ)</text>
  <text x="60" y="506" font-size="11" fill="#555">• 连续轨迹 (v(t), κ(t))</text>
  <text x="60" y="520" font-size="11" fill="#555">• 直接控制 (δ, τ, β)</text>

  <text x="340" y="490" font-size="24" fill="#e74c3c">→</text>

  <rect x="380" y="450" width="250" height="75" fill="#d5f5e3" rx="6" stroke="#27ae60" stroke-width="1"/>
  <text x="505" y="472" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">重卡 VLA 应有动作空间</text>
  <text x="390" y="490" font-size="11" fill="#555">• 6 轮独立扭矩 τ₁-τ₆</text>
  <text x="390" y="506" font-size="11" fill="#555">• 6 轮独立转角 δ₁-δ₆</text>
  <text x="390" y="520" font-size="11" fill="#555">• 侧翻约束 LTR ≤ LTR_max</text>

  <rect x="660" y="455" width="190" height="65" fill="#fef9e7" rx="6" stroke="#f39c12" stroke-width="1.5"/>
  <text x="755" y="477" text-anchor="middle" font-size="11" font-weight="bold" fill="#d68910">动作空间维度变化</text>
  <text x="670" y="496" font-size="11" fill="#555">乘用车: 2-4 维</text>
  <text x="670" y="511" font-size="11" fill="#e74c3c" font-weight="bold">重卡: 12+ 维!</text>
</svg>