<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
  </defs>

  <rect width="900" height="620" fill="url(#bgGrad)" rx="12"/>

  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">重卡 VLA 缺失的关键传感器维度</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#888">现有 VLA 模型使用的传感器 vs 重卡场景必需的额外传感器</text>

  <!-- Left: Passenger car VLA sensor suite -->
  <rect x="30" y="75" width="400" height="260" fill="#eaf2f8" rx="10" stroke="#3498db" stroke-width="1.5"/>
  <text x="230" y="102" text-anchor="middle" font-size="15" font-weight="bold" fill="#2980b9">现有 VLA 传感器（乘用车）</text>

  <!-- Sensors in boxes -->
  <rect x="50" y="118" width="170" height="55" fill="#fff" rx="6" stroke="#3498db" stroke-width="1"/>
  <text x="135" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">📷 RGB 相机</text>
  <text x="135" y="158" text-anchor="middle" font-size="11" fill="#555">6 路环视 / 前视</text>

  <rect x="240" y="118" width="170" height="55" fill="#fff" rx="6" stroke="#3498db" stroke-width="1"/>
  <text x="325" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">📡 LiDAR</text>
  <text x="325" y="158" text-anchor="middle" font-size="11" fill="#555">1-5 个，机械/固态</text>

  <rect x="50" y="185" width="170" height="55" fill="#fff" rx="6" stroke="#3498db" stroke-width="1"/>
  <text x="135" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">📊 毫米波雷达</text>
  <text x="135" y="225" text-anchor="middle" font-size="11" fill="#555">前向/角雷达</text>

  <rect x="240" y="185" width="170" height="55" fill="#fff" rx="6" stroke="#3498db" stroke-width="1"/>
  <text x="325" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">📍 GPS/IMU</text>
  <text x="325" y="225" text-anchor="middle" font-size="11" fill="#555">定位 + 姿态</text>

  <rect x="50" y="252" width="170" height="55" fill="#fff" rx="6" stroke="#3498db" stroke-width="1"/>
  <text x="135" y="274" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">🚗 车身状态</text>
  <text x="135" y="292" text-anchor="middle" font-size="11" fill="#555">车速/转向角/加速度</text>

  <rect x="240" y="252" width="170" height="55" fill="#fef9e7" rx="6" stroke="#f39c12" stroke-width="1.5"/>
  <text x="325" y="274" text-anchor="middle" font-size="13" font-weight="bold" fill="#d68910">🗣️ 语言指令</text>
  <text x="325" y="292" text-anchor="middle" font-size="11" fill="#555">导航指令/用户查询</text>

  <!-- Right: Heavy truck required extra sensors -->
  <rect x="470" y="75" width="400" height="260" fill="#fdedec" rx="10" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="670" y="102" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">重卡额外必需的传感器</text>

  <rect x="490" y="118" width="170" height="55" fill="#fff" rx="6" stroke="#e74c3c" stroke-width="1"/>
  <text x="575" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">⚖️ 载荷传感器</text>
  <text x="575" y="158" text-anchor="middle" font-size="11" fill="#555">各轴轴荷/总重</text>

  <rect x="680" y="118" width="170" height="55" fill="#fff" rx="6" stroke="#e74c3c" stroke-width="1"/>
  <text x="765" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">🎯 质心估算</text>
  <text x="765" y="158" text-anchor="middle" font-size="11" fill="#555">CG 高度/位置</text>

  <rect x="490" y="185" width="170" height="55" fill="#fff" rx="6" stroke="#e74c3c" stroke-width="1"/>
  <text x="575" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">🔄 挂车角度</text>
  <text x="575" y="225" text-anchor="middle" font-size="11" fill="#555">铰接角/挂车朝向</text>

  <rect x="680" y="185" width="170" height="55" fill="#fff" rx="6" stroke="#e74c3c" stroke-width="1"/>
  <text x="765" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">🌡️ 胎压/温度</text>
  <text x="765" y="225" text-anchor="middle" font-size="11" fill="#555">TPMS 轮胎状态</text>

  <rect x="490" y="252" width="170" height="55" fill="#fff" rx="6" stroke="#e74c3c" stroke-width="1"/>
  <text x="575" y="274" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">📐 悬挂行程</text>
  <text x="575" y="292" text-anchor="middle" font-size="11" fill="#555">空气悬挂位移</text>

  <rect x="680" y="252" width="170" height="55" fill="#fef9e7" rx="6" stroke="#f39c12" stroke-width="1.5"/>
  <text x="765" y="274" text-anchor="middle" font-size="13" font-weight="bold" fill="#d68910">🛞 轮毂电机</text>
  <text x="765" y="292" text-anchor="middle" font-size="11" fill="#555">各轮独立扭矩/转速</text>

  <!-- Bottom: Why weight/load matters -->
  <rect x="30" y="355" width="840" height="250" fill="#fff" rx="10" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="382" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e8449">为什么载荷/重量信息对重卡 VLA 至关重要？</text>

  <!-- Point 1 -->
  <circle cx="65" cy="415" r="14" fill="#27ae60"/>
  <text x="65" y="420" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">1</text>
  <text x="90" y="420" font-size="13" font-weight="bold" fill="#2c3e50">侧翻阈值随载荷变化</text>
  <text x="90" y="438" font-size="11" fill="#555">空载 vs 满载的侧翻临界横向加速度差异巨大（0.4g vs 0.25g），VLA 必须感知当前载重才能输出安全轨迹</text>

  <!-- Point 2 -->
  <circle cx="65" cy="465" r="14" fill="#27ae60"/>
  <text x="65" y="470" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">2</text>
  <text x="90" y="470" font-size="13" font-weight="bold" fill="#2c3e50">制动距离与载重成正比</text>
  <text x="90" y="488" font-size="11" fill="#555">满载重卡制动距离可达乘用车的 3-5 倍（80km/h 下需 60-80m），VLA 的路径规划必须编码载重信息</text>

  <!-- Point 3 -->
  <circle cx="65" cy="515" r="14" fill="#27ae60"/>
  <text x="65" y="520" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">3</text>
  <text x="90" y="520" font-size="13" font-weight="bold" fill="#2c3e50">载荷分布影响动力学行为</text>
  <text x="90" y="538" font-size="11" fill="#555">前后轴载荷分布影响转向响应、轮胎侧偏刚度，进而影响 VLA 动作头的轨迹生成精度</text>

  <!-- Point 4 -->
  <circle cx="65" cy="565" r="14" fill="#e74c3c"/>
  <text x="65" y="570" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">4</text>
  <text x="90" y="570" font-size="13" font-weight="bold" fill="#c0392b">现有 VLA 动作空间完全忽略</text>
  <text x="90" y="588" font-size="11" fill="#555">所有 VLA 模型的动作头输出（轨迹/控制量）均未将载荷作为条件输入，这是最直接的架构缺陷</text>
</svg>